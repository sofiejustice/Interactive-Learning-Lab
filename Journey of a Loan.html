ze: 12px; font-weight: 300; color: var(--grey); }\n\n.progress-track {\n  margin-top: 9px;\n  height: 6px;\n  border-radius: 999px;\n  background: rgba(255, 255, 255, 0.1);\n  overflow: hidden;\n}\n.progress-fill {\n  height: 100%;\n  width: 0%;\n  border-radius: 999px;\n  background: linear-gradient(90deg, var(--purple), #9a6fe0);\n  transition: width 0.45s var(--ease);\n}\n\n/* product legend (fulfillment+) */\n.legend {\n  display: none;\n  align-items: center;\n  flex-wrap: wrap;\n  gap: 8px 16px;\n  margin-top: 18px;\n  padding: 11px 16px;\n  border: 1px dashed rgba(255, 255, 255, 0.18);\n  border-radius: 12px;\n  font-size: 12px;\n  font-weight: 300;\n  color: #c9c7e8;\n}\nbody[data-product] .legend { display: flex; }\n.legend .legend-title { font-weight: 600; color: var(--offwhite); letter-spacing: 0.02em; }\n.legend-item { display: inline-flex; align-items: center; gap: 7px; }\n.legend-swatch { width: 13px; height: 13px; border-radius: 4px; }\n\n/* ---------------- Layer switcher ---------------- */\n.modeswitch {\n  display: flex;\n  align-items: center;\n  flex-wrap: wrap;\n  gap: 10px 14px;\n  margin-bottom: 24px;\n  padding-bottom: 22px;\n  border-bottom: 1px solid rgba(255, 255, 255, 0.1);\n}\n.modeswitch .ms-label {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--eyebrow);\n}\n.ms-pills {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n}\n.ms-pills button {\n  font-family: inherit;\n  cursor: pointer;\n  white-space: nowrap;\n  font-size: 12px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  color: #c9c7e8;\n  background: rgba(255, 255, 255, 0.05);\n  border: 1px solid rgba(255, 255, 255, 0.14);\n  border-radius: 999px;\n  padding: 7px 14px;\n  transition: background 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease);\n}\n.ms-pills button:hover { background: rgba(255, 255, 255, 0.1); color: var(--offwhite); }\n.ms-pills button.is-current,\n.ms-pills button[aria-selected=\"true\"] {\n  background: var(--purple);\n  border-color: var(--purple);\n  color: #fff;\n}\n\n/* Locked stepper: non-interactive progress indicator for Rise embeds */\nbody.locked .ms-pills button { pointer-events: none; }\nbody.locked .ms-pills button[data-setmode=\"full\"] { display: none; }\nbody.locked .ms-pills button.done {\n  color: var(--teal);\n  border-color: rgba(45, 184, 160, 0.5);\n  background: var(--teal-soft);\n}\nbody.locked .ms-pills button.upcoming { opacity: 0.4; }\nbody.locked .ms-stepcount {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  color: var(--eyebrow);\n  margin-left: auto;\n  white-space: nowrap;\n}\n.ms-stepcount { display: none; }\nbody.locked .ms-stepcount { display: inline; }\n\n/* ---------------- Phase ---------------- */\n.phase { margin-top: 30px; }\n.phase[hidden] { display: none; }\n.phase-header {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  margin: 0 0 4px;\n  padding-left: 4px;\n}\n.phase-index {\n  font-size: 12px;\n  font-weight: 700;\n  letter-spacing: 0.16em;\n  color: var(--eyebrow);\n  text-transform: uppercase;\n}\n.phase-header h2 {\n  font-size: clamp(19px, 5.5vw, 23px);\n  font-weight: 800;\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n  margin: 0;\n  color: var(--offwhite);\n}\n.phase-bar {\n  display: none;\n  width: 4px;\n  align-self: stretch;\n  min-height: 26px;\n  border-radius: 999px;\n  background: var(--accent, var(--purple));\n}\n.phase-product {\n  display: none;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--accent, var(--purple));\n  background: color-mix(in srgb, var(--accent, var(--purple)) 16%, transparent);\n  padding: 4px 10px;\n  border-radius: 999px;\n  white-space: nowrap;\n}\nbody[data-product] .phase-bar { display: block; }\nbody[data-product] .phase-product { display: inline-block; }\n\n/* ---------------- Step row + spine ---------------- */\n.steps { position: relative; }\n.step {\n  display: grid;\n  grid-template-columns: var(--rail) 1fr;\n  position: relative;\n}\n.step[hidden] { display: none; }\n\n.rail {\n  position: relative;\n  display: flex;\n  justify-content: center;\n}\n.rail .line {\n  position: absolute;\n  top: 14px;\n  bottom: -2px;\n  width: 10px;\n  border-radius: 6px;\n  background: var(--asphalt);\n  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);\n  transform-origin: top center;\n}\n.rail .line::before {\n  content: \"\";\n  position: absolute;\n  left: 50%;\n  top: 5px;\n  bottom: 5px;\n  width: 2px;\n  transform: translateX(-50%);\n  border-radius: 2px;\n  background: repeating-linear-gradient(180deg, var(--lane) 0 7px, transparent 7px 15px);\n  opacity: 0.5;\n}\n.rail .line::after {\n  content: \"\";\n  position: absolute;\n  left: 50%;\n  top: 5px;\n  bottom: 5px;\n  width: 3px;\n  transform: translateX(-50%);\n  border-radius: 3px;\n  background: var(--accent, var(--purple));\n  opacity: 0;\n  transition: opacity 0.5s var(--ease);\n}\n.step.is-complete .rail .line::after { opacity: 0.85; }\n.step:last-child .rail .line { display: none; }\n\n.node {\n  position: relative;\n  z-index: 2;\n  margin-top: 8px;\n  width: 34px;\n  height: 34px;\n  flex: 0 0 34px;\n  border-radius: 50%;\n  display: grid;\n  place-items: center;\n  font-size: 14px;\n  font-weight: 700;\n  background: var(--navy);\n  border: 2px solid var(--accent, var(--purple));\n  color: var(--accent, var(--purple));\n  transition: background 0.3s var(--ease), color 0.3s var(--ease), box-shadow 0.3s var(--ease);\n}\n.step.is-active .node {\n  box-shadow: 0 0 0 5px color-mix(in srgb, var(--accent, var(--purple)) 22%, transparent);\n}\n.step.is-complete .node {\n  background: var(--accent, var(--purple));\n  color: #fff;\n}\n.node .check { display: none; width: 18px; height: 18px; }\n.step.is-complete .node .num { display: none; }\n.step.is-complete .node .check { display: block; }\n\n/* ---------------- Road car (you-are-here marker) ---------------- */\n#timeline { position: relative; }\n.roadcar {\n  position: absolute;\n  top: 0;\n  left: 0;\n  width: 42px;\n  height: 42px;\n  z-index: 5;\n  pointer-events: none;\n  opacity: 0;\n  transform: translate(-100px, -100px) translate(-50%, -50%);\n  transition: transform 0.7s cubic-bezier(0.45, 0.05, 0.2, 1), opacity 0.4s var(--ease);\n  filter: drop-shadow(0 5px 7px rgba(0, 0, 0, 0.55));\n  will-change: transform;\n}\n.roadcar svg { width: 42px; height: 42px; display: block; }\n@media (prefers-reduced-motion: reduce) {\n  .roadcar { transition: opacity 0.2s linear; }\n}\n\n/* ---------------- Card ---------------- */\n.card {\n  background: var(--offwhite);\n  color: var(--ink);\n  border-radius: 16px;\n  padding: 20px 20px 20px;\n  margin: 0 0 18px 14px;\n  border: 1px solid rgba(10, 7, 77, 0.08);\n  box-shadow: 0 10px 30px -16px rgba(0, 0, 0, 0.5);\n  position: relative;\n  transition: background 0.35s var(--ease), opacity 0.35s var(--ease), filter 0.35s var(--ease);\n}\n.step.is-complete .card {\n  background: var(--lavender);\n  filter: saturate(0.92);\n}\n.step.is-complete .card .what { color: var(--ink-soft); }\n\n.card-top {\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  gap: 12px;\n  margin-bottom: 10px;\n}\n.step-eyebrow {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--eyebrow);\n}\n.card h3 {\n  font-size: clamp(17px, 4.6vw, 20px);\n  font-weight: 800;\n  line-height: 1.08;\n  letter-spacing: -0.01em;\n  margin: 2px 0 0;\n  color: var(--navy);\n}\n.what {\n  font-size: 14.5px;\n  font-weight: 300;\n  line-height: 1.5;\n  margin: 11px 0 0;\n  color: var(--ink);\n  text-wrap: pretty;\n}\n\n.meta-row {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  gap: 10px;\n  margin-top: 14px;\n}\n.time-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 12.5px;\n  font-weight: 600;\n  color: var(--ink-soft);\n  background: rgba(10, 7, 77, 0.06);\n  border-radius: 999px;\n  padding: 5px 12px 5px 10px;\n}\n.time-badge svg { width: 14px; height: 14px; opacity: 0.7; }\n/* automated: this step now takes a fraction of the time */\n.time-badge.is-fast {\n  color: var(--green-text);\n  background: var(--green-soft);\n}\n.time-badge.is-fast svg { opacity: 1; color: var(--green); }\n\n.completed-flag {\n  display: none;\n  align-items: center;\n  gap: 6px;\n  font-size: 12px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  color: var(--purple);\n}\n.step.is-complete .completed-flag { display: inline-flex; }\n.completed-flag svg { width: 15px; height: 15px; }\n\n/* persona */\n.persona-wrap { display: none; flex-shrink: 0; }\nbody[data-persona] .persona-wrap { display: block; }\n.persona-chain {\n  display: flex;\n  align-items: center;\n  flex-wrap: wrap;\n  gap: 4px;\n  justify-content: flex-end;\n}\n.persona {\n  display: inline-flex;\n  align-items: center;\n  gap: 7px;\n  padding: 5px 13px 5px 6px;\n  border-radius: 999px;\n  background: var(--p-soft, var(--grey-soft));\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--navy);\n  white-space: nowrap;\n}\n.persona .av {\n  width: 24px; height: 24px;\n  border-radius: 50%;\n  background: var(--p-color, var(--grey));\n  color: #fff;\n  font-size: 11px;\n  font-weight: 700;\n  display: grid;\n  place-items: center;\n  flex: 0 0 auto;\n  overflow: hidden;\n}\n.persona .av.av-photo { background: var(--lavender); }\n.persona .av.av-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }\n.persona .role { font-weight: 300; color: var(--ink-soft); font-size: 12px; }\n.persona-arrow { color: var(--eyebrow); font-weight: 700; font-size: 12px; padding: 0 1px; }\n.handoff-tag {\n  display: block;\n  text-align: right;\n  margin-top: 5px;\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--orange);\n}\n\n/* ---- at-a-glance traffic light (card header) ---- */\n.trafficlight {\n  display: none;\n  align-items: center;\n  gap: 6px;\n  margin-left: auto;\n  padding: 6px 9px;\n  border-radius: 999px;\n  background: rgba(10, 7, 77, 0.045);\n  border: 1px solid rgba(10,7,77,0.08);\n  flex: 0 0 auto;\n}\nbody[data-persona] .card .trafficlight { display: inline-flex; }\n.tl-dot {\n  width: 10px; height: 10px;\n  border-radius: 50%;\n  background: var(--c);\n  opacity: 0.16;\n  transition: opacity 0.4s var(--ease), box-shadow 0.4s var(--ease);\n}\n.tl-red { --c: var(--red); }\n.tl-amber { --c: var(--orange); }\n.tl-green { --c: var(--green); }\n.tl-dot.on {\n  opacity: 1;\n  box-shadow: 0 0 0 2.5px color-mix(in srgb, var(--c) 22%, transparent),\n              0 0 7px color-mix(in srgb, var(--c) 55%, transparent);\n}\n\n/* ---- signal stack: red (hard stop) · amber (friction) · green (STP) ---- */\n.signals { display: none; }\nbody[data-persona] .signals {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: flex-start;\n  gap: 14px 28px;\n  margin-top: 15px;\n  border-top: 1px solid rgba(10,7,77,0.08);\n  padding-top: 14px;\n}\n/* red (hard stop) + amber (friction) sit side by side; green STP wraps to its own full-width row */\n.signals > .signal { flex: 1 1 0; min-width: 210px; }\n.signals > .stp { flex: 1 1 100%; }\n.signal-toggle {\n  display: inline-flex;\n  align-items: center;\n  gap: 9px;\n  background: none;\n  border: 0;\n  padding: 4px 2px;\n  margin: -4px -2px;\n  cursor: pointer;\n  font-family: inherit;\n  font-size: 12.5px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.signal-toggle .sig-leds { flex: 0 0 auto; display: inline-flex; align-items: center; }\n.signal-toggle .sig-led {\n  flex: 0 0 auto;\n  width: 11px; height: 11px;\n  border-radius: 50%;\n  transition: background 0.3s var(--ease), box-shadow 0.3s var(--ease), opacity 0.3s var(--ease), width 0.3s var(--ease);\n}\n.sig-led--from {\n  background: var(--sig);\n  box ransparent);\n}\n@media (prefers-reduced-motion: no-preference) {\n  .signal.is-resolved .sig-led--to { animation: ledTurnsGreen 0.75s var(--ease) 0.12s both; }\n}\n@keyframes ledTurnsGreen {\n  0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--green) 55%, transparent); }\n  60% { box-shadow: 0 0 0 9px color-mix(in srgb, var(--green) 0%, transparent); }\n  100% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 24%, transparent); }\n}\n.signal.is-resolved .signal-toggle { color: var(--green-text); }\n.signal.is-resolved .signal-copy {\n  color: var(--ink-soft);\n  text-decoration: line-through;\n  text-decoration-color: rgba(58, 55, 96, 0.45);\n  border-left-color: var(--green);\n  opacity: 0.75;\n}\n.signal.is-resolved .signal-fixed { display: inline-flex; }\n\n/* STP green lights */\n.stp { display: none; }\nbody[data-stp] .stp:not(.stp--ful) { display: block; }\nbody[data-product] .stp.stp--ful { display: block; }\n.stp-skip {\n  display: flex;\n  gap: 10px;\n  align-items: flex-start;\n  background: var(--green-soft);\n  border: 1px solid rgba(22,163,74,0.28);\n  border-radius: 12px;\n  padding: 11px 13px;\n  font-size: 13px;\n  font-weight: 300;\n  line-height: 1.45;\n  color: #134e2e;\n}\n.stp-skip b { font-weight: 700; }\n.stp-lights .stp-head .bolt { width: 14px; height: 14px; flex: 0 0 auto; color: var(--green); }\n.stp-skip .bolt { flex: 0 0 auto; width: 18px; height: 18px; color: var(--green); margin-top: 1px; }\n.stp-lights {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.stp-lights .stp-head {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--green-text);\n  display: flex;\n  align-items: center;\n  gap: 7px;\n}\n.greenlight {\n  width: 100%;\n  text-align: left;\n  display: flex;\n  align-items: center;\n  gap: 9px;\n  background: var(--green-soft);\n  border: 1px solid rgba(22,163,74,0.26);\n  border-radius: 12px;\n  padding: 9px 12px;\n  cursor: pointer;\n  font-famil e without context; Riley patches together what she can.',\n    hardStop: 'An ineligible product or failed membership check ends it here — declined before an underwriter ever sees it.'\n  },\n  {\n    phase: 2, title: 'Queue', time: '1–2 days', dMin: 1, dMax: 2, timeAuto: 'Skipped', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Application waits for review. No one has touched it yet.',\n    personas: [P.queue], queue: true,\n    friction: 'No automated prioritization; volume spikes push waits to 3+ days.',\n    hardStop: 'Days of silence; the member loses patience and the application is abandoned in the queue.',\n    skip: 'STP skips the queue entirely — automated processing begins immediately after intake.'\n  },\n  {\n    phase: 2, title: 'Initial Review', time: '15–30 min', dMin: 1, dMax: 1, timeAuto: 'Instant', dMinAuto: 0, dMaxAuto: 0,\n    what: 'File opened. Credit report pulled. Application checked for completeness.',\n    personas: [P.tommie],\n    friction: 'Credit report, income docs, and collateral values in three different systems — no single view.',\n    hardStop: 'An identity or fraud flag stops the file cold — manual review or outright decline.',\n    greenLights: [{ n: 'Membership & Fraud', t: 'Alloy checks identity and fraud signals automatically.' }]\n  },\n  {\n    phase: 2, title: 'Income Verification', time: '1–3 days', dMin: 1, dMax: 2, timeAuto: 'Instant', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Income docs requested. Collected. Sent back for review.',\n    personas: [P.tommie, P.msr, P.alex], handoff: true,\n    friction: 'Wrong doc sent; loop restarts.',\n    hardStop: 'Income can’t be documented — the loan is denied for unverifiable capacity to repay.',\n    greenLights: [{ n: 'Underwriting', t: 'Income verified automatically via third-party data. No doc requests.' }]\n  },\n  {\n    phase: 2, title: 'Credit Decisioning', time: '30–60 min', dMin: 1, dMax: 1, timeAuto: 'Instant', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Credit evaluated against policy. Decision made.',\n    personas: [P.tommie],\n    friction: 'Borderline files take much longer; accountability math skews toward caution.',\n    hardStop: 'Credit falls outside policy and the application is declined.',\n    greenLights: [{ n: 'Condition Resolution', t: 'The Loan Policy Engine evaluates automatically. Clean files auto-approve.' }]\n  },\n  {\n    phase: 2, title: 'Conditions & Stips', time: '1–2 days', dMin: 1, dMax: 2, timeAuto: 'Minutes', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Conditions set. Docs collected. Conditions cleared.',\n    personas: [P.tommie, P.msr, P.alex], handoff: true,\n    friction: \"Alex's silence reads as rejection; nobody auto-notified Alex the loan was approved.\",\n    hardStop: 'Conditions go unmet and the approval expires — a green-lit loan still falls out.',\n    greenLights: [\n      { n: 'Protection Products', t: 'Calculated automatically — no manual quoting.' },\n      { n: 'Loan Documents', t: 'Generated automatically the moment conditions clear.' }\n    ]\n  },\n  {\n    phase: 3, title: 'Document Preparation', time: '30–60 min', dMin: 1, dMax: 1, timeAuto: 'Instant', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Loan documents generated. Deal terms verified.',\n    personas: [P.max],\n    friction: 'Manual data entry; errors require re-execution after signing.',\n    hardStop: 'A data-entry error surfaces after signing and the documents must be re-executed.',\n    greenLights: [{ n: 'Document Generation', t: 'Clutch Fulfillment builds the package automatically from verified deal terms — no manual entry.' }]\n  },\n  {\n    phase: 3, title: 'Member Signing', time: '1–3 days', dMin: 1, dMax: 2, timeAuto: 'Minutes', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Documents sent. Alex reviews and signs.',\n    personas: [P.max, P.alex, P.riley], handoff: true,\n    friction: 'Mailed docs add days; a missed signature field sends the whole packet back.',\n    hardStop: 'The member never signs and the approval lapses — the funded deal is lost.',\n    greenLights: [{ n: 'E-Sign', t: 'The packet is delivered for instant e-sign; required fields can’t be missed.' }]\n  },\n  {\n    phase: 3, title: 'Final Review', time: '30–60 min', dMin: 0, dMax: 0, timeAuto: 'Instant', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Final check: conditions cleared, terms match, account in good standing.',\n    personas: [P.max],\n    friction: 'Double-review required by NCUA separation of duties.',\n    hardStop: 'A discrepancy kicks the file back to underwriting — the clock resets.',\n    greenLights: [{ n: 'Automated QC', t: 'Conditions, terms, and standing are verified automatically — no second manual pass.' }]\n  },\n  {\n    phase: 3, title: 'Booking & Disbursement', time: 'Same day', dMin: 0, dMax: 0, timeAuto: 'Instant', dMinAuto: 0, dMaxAuto: 0,\n    what: 'Loan booked to core. Funds disbursed. Alex is funded.',\n    personas: [P.max],\n    friction: 'Core errors and wire cutoff windows can delay even after everything is done.',\n    hardStop: 'A core error or missed wire cutoff blocks funding even after everything is approved.',\n    greenLights: [{ n: 'Auto-Booking', t: 'Booked to core and disbursed automatically the moment signing completes.' }]\n  }\n];\n\n/* ---------------- Mode ---------------- */\nconst MODE_LEVEL = { base: 0, personas: 1, stp: 2, fulfillment: 3, full: 4 };\nconst MODE_LABEL = {\n  base: 'Typical Loan Journey',\n  personas: \"Personas: Who's Involved\",\n  stp: 'STP Journey',\n  fulfillment: 'Clutch Fulfillment',\n  full: 'Full reference'\n};\nlet mode = 'base'; // traditional loan journey only — other layers blocked for this build\nlet level = MODE_LEVEL[mode];\nlet showPersona = level >= 1;\nlet showStp = level >= 2;\nlet showProduct = level >= 3;\nlet locking = mode !== 'full';\n\n// Locked-stepper mode for Rise embeds: pin one layer, disable navigation.\nconst LOCK_PARAM = new URLSearchParams(location.search).get('lock');\nconst lessonLock = LOCK_PARAM === '1' || LOCK_PARAM === 'true';\nconst LESSON_SEQ = ['base', 'personas', 'stp', 'fulfillment'];\n\nconst reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n/* ---------------- Build DOM ---------------- */\nconst timeline = document.getElementById('timeline');\nconst phaseEls = {};\nconst stepEls = [];\n\nPHASES.forEach(ph => {\n  const sec = document.createElement('section');\n  sec.className = 'phase';\n  sec.setAttribute('data-phase', ph.idx);\n  sec.style.setProperty('--accent', PHASE_COLOR[ph.idx]);\n  sec.innerHTML = `\n    <div class=\"phase-header\">\n      <span class=\"phase-bar\"><\u002Fspan>\n      <span class=\"phase-index\">Phase ${ph.idx}<\u002Fspan>\n      <h2>${ph.name}<\u002Fh2>\n      <span class=\"phase-product\">${PHASE_PRODUCT[ph.idx]}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"steps\" data-steps=\"${ph.idx}\"><\u002Fdiv>`;\n  timeline.appendChild(sec);\n  phaseEls[ph.idx] = sec;\n});\n\nfunction personaChip(p) {\n  const av = p.portrait\n    ? `<span class=\"av av-photo\"><img src=\"${p.portrait}\" alt=\"\" /><\u002Fspan>`\n    : `<span class=\"av\">${p.init}<\u002Fspan>`;\n  return `<span class=\"persona\" style=\"--p-color:${p.color};--p-soft:${p.soft}\">\n      ${av}\n      <span>${p.name}<\u002Fspan>\n      ${p.role ? `<span class=\"role\">${p.role}<\u002Fspan>` : ''}\n    <\u002Fspan>`;\n}\n\nfunction personaBlock(step) {\n  if (!step.personas) return '';\n  let chips;\n  if (step.handoff) {\n    chips = step.personas.map(personaChip).join('<span class=\"persona-arrow\">→<\u002Fspan>');\n  } else {\n    chips = step.personas.map(personaChip).join('');\n  }\n  const tag = step.handoff ? '<span class=\"handoff-tag\">Handoff<\u002Fspan>' : '';\n  return `<div class=\"persona-wrap\"><div class=\"persona-chain\">${chips}<\u002Fdiv>${tag}<\u002Fdiv>`;\n}\n\nfunction signalBlock(kind, copy, label) {\n  if (!copy) return '';\n  const fixed = kind === 'hardstop'\n    ? `${ICON.checkSmall} De-risked by Clutch — now automated`\n    : `${ICON.checkSmall} Eliminated by Clutch — now automated`;\n  return `\n      <div class=\"signal ${kind}\">\n        <button class=\"signal-toggle\" type=\"button\" aria-expanded=\"false\">\n          <span class=\"sig-leds\">\n            <span class=\"sig-led sig-led--from\"><\u002Fspan>\n            <span class=\"sig-shift\">${ICON.arrow}<\u002Fspan>\n            <span class=\"sig-led sig-led--to\"><\u002Fspan>\n          <\u002Fspan>\n          <span class=\"sig-label\">${label}<\u002Fspan>\n          ${ICON.caret}\n        <\u002Fbutton>\n        <div class=\"signal-panel\"><div>\n          <p class=\"signal-copy\">${copy}<\u002Fp>\n          <span class=\"signal-fixed\">${fixed}<\u002Fspan>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>`;\n}\n\nfunction stpBlock(step) {\n  let inner = '';\n  if (step.skip) {\n    inner = `<div class=\"stp-skip\">${ICON.bolt}<div><b>STP fast path.<\u002Fb> ${step.skip}<\u002Fdiv><\u002Fdiv>`;\n  } else if (step.greenLights) {\n    const lights = step.greenLights.map((g) => `\n      <button class=\"greenlight\" type=\"button\" aria-expanded=\"false\" data-gl>\n        <span class=\"led\"><\u002Fspan>\n        <span class=\"gl-name\">${g.n}<\u002Fspan>\n        ${ICON.glCaret}\n      <\u002Fbutton>\n      <div class=\"gl-panel\"><div><p class=\"gl-copy\">${g.t}<\u002Fp><\u002Fdiv><\u002Fdiv>`).join('');\n    const ful = step.phase === 3;\n    const plural = step.greenLights.length > 1;\n    const label = ful\n      ? (plural ? 'Green lights — Clutch Fulfillment' : 'Green light — Clutch Fulfillment')\n      : (plural ? 'Green lights — automated' : 'Green light — automated');\n    inner = `<div class=\"stp-lights\"><span class=\"stp-head\">${ICON.bolt}${label}<\u002Fspan>${lights}<\u002Fdiv>`;\n  } else {\n    return '';\n  }\n  const fulCls = step.phase === 3 ? ' stp--ful' : '';\n  return `<div class=\"stp${fulCls}\">${inner}<\u002Fdiv>`;\n}\n\nSTEPS.forEach((step, i) => {\n  const ph = step.phase;\n  const accent = PHASE_COLOR[ph];\n  const wrap = phaseEls[ph].querySelector('[data-steps=\"' + ph + '\"]');\n  const art = document.createElement('article');\n  art.className = 'step';\n  art.setAttribute('data-step', i);\n  // accent: product color when product mode, else neutral purple\n  art.style.setProperty('--accent', showProduct ? accent : 'var(--purple)');\n\n  art.innerHTML = `\n    <div class=\"rail\"><div class=\"line\"><\u002Fdiv>\n      <div class=\"node\"><span class=\"num\">${i + 1}<\u002Fspan>${ICON.check}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"card-top\">\n        <div>\n          <div class=\"step-eyebrow\">Step ${i + 1} · ${PHASES[ph - 1].name}<\u002Fdiv>\n          <h3>${step.title}<\u002Fh3>\n        <\u002Fdiv>\n        ${personaBlock(step)}\n      <\u002Fdiv>\n      <p class=\"what\">${step.what}<\u002Fp>\n      <div class=\"meta-row\">\n        <span class=\"time-badge\">${ICON.clock}${step.time}<\u002Fspan>\n        <span class=\"completed-flag\">${ICON.checkSmall} Done<\u002Fspan>\n        <span class=\"trafficlight\" aria-hidden=\"true\">\n          <span class=\"tl-dot tl-red\"><\u002Fspan>\n          <span class=\"tl-dot tl-amber\"><\u002Fspan>\n          <span class=\"tl-dot tl-green\"><\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"signals\">\n        ${signalBlock('hardstop', step.hardStop, 'See the hard stop')}\n        ${signalBlock('friction', step.friction, 'See the friction')}\n        ${stpBlock(step)}\n      <\u002Fdiv>\n      <div class=\"advance\">\n        <button class=\"btn-continue\" type=\"button\" data-continue>Continue ${ICON.arrow}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  wrap.appendChild(art);\n  stepEls.push(art);\n});\n\n/* ---------------- Road car (you-are-here, drives between stops) ---------------- */\nconst roadcar = document.createElement('div');\nroadcar.className = 'roadcar';\nroadcar.setAttribute('aria-hidden', 'true');\nroadcar.innerHTML = '<svg viewBox=\"0 0 48 48\"><rect x=\"6\" y=\"22\" width=\"36\" height=\"13\" rx=\"4\" fill=\"#7146B5\"/><path d=\"M13 22 L18 14 H30 L36 22 Z\" fill=\"#8a5fd0\"/><rect x=\"19\" y=\"16.5\" width=\"11\" height=\"6\" rx=\"1.5\" fill=\"#cdb6f2\"/><circle cx=\"16\" cy=\"36\" r=\"5\" fill=\"#16142e\" stroke=\"#fff\" stroke-width=\"1.5\"/><circle cx=\"33\" cy=\"36\" r=\"5\" fill=\"#16142e\" stroke=\"#fff\" stroke-width=\"1.5\"/><circle cx=\"40.5\" cy=\"27\" r=\"2\" fill=\"#F6B433\"/><\u002Fsvg>';\ntimeline.appendChild(roadcar);\nlet carShown = false;\n\nfunction placeCar(nodeEl, instant, yOffset) {\n  const tRect = timeline.getBoundingClientRect();\n  const nRect = nodeEl.getBoundingClientRect();\n  if (!nRect.width) return;\n  const x = nRect.left - tRect.left + nRect.width / 2;\n  const y = nRect.top - tRect.top + nRect.height / 2 + (yOffset || 0);\n  if (instant || reduceMotion) roadcar.style.transition = 'none';\n  roadcar.style.transform = 'translate(' + x + 'px,' + y + 'px) translate(-50%,-50%)';\n  if (!carShown) { roadcar.style.opacity = '1'; carShown = true; }\n  if (instant || reduceMotion) { void roadcar.offsetWidth; roadcar.style.transition = ''; }\n}\nfunction moveCarToNode(nodeEl, instant, yOffset) {\n  if (!nodeEl || mode === 'full') return;\n  placeCar(nodeEl, instant, yOffset);\n  // settle pass for instant placements only (don't interrupt a drive)\n  if (instant) setTimeout(() => { if (mode !== 'full') placeCar(nodeEl, true, yOffset); }, 80);\n}\nwindow.addEventListener('resize', () => {\n  if (mode === 'full' || !carShown) return;\n  const act = stepEls.find(el => el.classList.contains('is-active'));\n  if (act) moveCarToNode(act.querySelector('.node'), true);\n});\n\n/* ---------------- Signals: traffic-light state + labels (mode-aware) ---------------- */\n// Does the current mode surface green automation for this step?\nfunction stepResolved(step) {\n  if (step.skip && showStp) return true;\n  if (step.greenLights) return step.phase === 3 ? showProduct : showStp;\n  return false;\n}\n// Effective (mode-aware) time + days: automated values once a step is resolved.\nfunction stepTime(step) { return stepResolved(step) ? (step.timeAuto || step.time) : step.time; }\nfunction stepDMin(step) { return stepResolved(step) ? (step.dMinAuto || 0) : step.dMin; }\nfunction stepDMax(step) { return stepResolved(step) ? (step.dMaxAuto || 0) : step.dMax; }\nfunction refreshTimes() {\n  stepEls.forEach((el, i) => {\n    const badge = el.querySelector('.time-badge');\n    if (!badge) return;\n    const fast = stepResolved(STEPS[i]);\n    badge.innerHTML = (fast ? ICON.bolt : ICON.clock) + stepTime(STEPS[i]);\n    badge.classList.toggle('is-fast', fast);\n  });\n}\nfunction signalLabel(kind, resolved, open) {\n  if (open) return '';\n  if (kind === 'hardstop') return resolved ? 'Red light to green light' : 'See the hard stop';\n  return resolved ? 'Yellow light to green light' : 'See the friction';\n}\nfunction refreshSignalLabels() {\n  document.querySelectorAll('.signal').forEach(s => {\n    const btn = s.querySelector('.signal-toggle');\n    if (!btn) return;\n    const open = btn.getAttribute('aria-expanded') === 'true';\n    const kind = s.classList.contains('hardstop') ? 'hardstop' : 'friction';\n    const lbl = btn.querySelector('.sig-label');\n    if (lbl) {\n      const text = signalLabel(kind, s.classList.contains('is-resolved'), open);\n      lbl.textContent = text;\n      lbl.style.display = text ? '' : 'none';\n    }\n  });\n}\n// Light the dots + flip red/amber to \"resolved\" (green) per the active mode.\nfunction updateTrafficLights() {\n  STEPS.forEach((step, i) => {\n    const el = stepEls[i];\n    if (!el) return;\n    const resolved = stepResolved(step);\n    const tl = el.querySelector('.trafficlight');\n    if (tl) {\n      tl.querySelector('.tl-red').classList.toggle('on', showPersona && !!step.hardStop && !resolved);\n      tl.querySelector('.tl-amber').classList.toggle('on', showPersona && !!step.friction && !resolved);\n      tl.querySelector('.tl-green').classList.toggle('on', resolved);\n    }\n    el.querySelectorAll('.signal.hardstop, .signal.friction').forEach(s => {\n      s.classList.toggle('is-resolved', resolved);\n    });\n  });\n  refreshSignalLabels();\n}\n\n/* ---------------- Route overview map (reflects phase progress) ---------------- */\nconst routemap = document.getElementById('routemap');\nfunction updateRouteMap() {\n  if (!routemap) return;\n  let curPhase = 0;\n  const done = [];\n  if (mode === 'full') {\n    done.push(1, 2, 3);\n  } else {\n    curPhase = STEPS[Math.min(current, STEPS.length - 1)].phase;\n    [1, 2, 3].forEach(p => {\n      const anyStep = STEPS.some(s => s.phase === p);\n      const allDone = STEPS.every((s, i) => s.phase !== p || stepEls[i].classList.contains('is-complete'));\n      if (anyStep && allDone) done.push(p);\n    });\n  }\n  routemap.querySelectorAll('.rm-stop').forEach(g => {\n    const p = +g.getAttribute('data-phase');\n    const isDone = done.indexOf(p) > -1;\n    g.classList.toggle('done', isDone);\n    g.classList.toggle('current', !isDone && p === curPhase);\n  });\n  routemap.classList.toggle('arrived', done.length === 3);\n}\n\n/* ---------------- Interactions: friction + green lights ---------------- */\ntimeline.addEventListener('click', (e) => {\n  const st = e.target.closest('.signal-toggle');\n  if (st) {\n    const open = st.getAttribute('aria-expanded') === 'true';\n    st.setAttribute('aria-expanded', String(!open));\n    st.parentElement.querySelector('.signal-panel').classList.toggle('open', !open);\n    const sig = st.closest('.signal');\n    const kind = sig.classList.contains('hardstop') ? 'hardstop' : 'friction';\n    const lbl = st.querySelector('.sig-label');\n    if (lbl) lbl.textContent = signalLabel(kind, sig.classList.contains('is-resolved'), !open);\n    return;\n  }\n  const gl = e.target.closest('.greenlight');\n  if (gl) {\n    const open = gl.getAttribute('aria-expanded') === 'true';\n    gl.setAttribute('aria-expanded', String(!open));\n    gl.nextElementSibling.classList.toggle('open', !open);\n    return;\n  }\n});\n\n/* ---------------- Days counter ---------------- */\nconst daysValueEl = document.getElementById('days-value');\nconst daysSubEl = document.getElementById('days-sub');\nlet accMin = 0, accMax = 0;\nlet dispMin = 0, dispMax = 0;\n\nfunction fmtDays(min, max) {\n  if (max === 0) return '<1';\n  if (min === max) return String(min);\n  if (min === 0) return (max === 1) ? '<1' : '<1–' + max;\n  return min + '–' + max;\n}\nfunction subLabel(min, max) {\n  return (max <= 1) ? 'working day' : 'working days';\n}\n\nfunction snapCounter() {\n  dispMin = accMin; dispMax = accMax;\n  daysValueEl.textContent = fmtDays(dispMin, dispMax);\n  daysSubEl.textContent = subLabel(dispMin, dispMax);\n}\n\nfunction animateCounter() {\n  if (reduceMotion) {\n    snapCounter();\n    return;\n  }\n  daysValueEl.classList.add('tick');\n  setTimeout(() => daysValueEl.classList.remove('tick'), 260);\n  // Guaranteed landing on the correct value even if rAF is throttled/stalled.\n  setTimeout(snapCounter, 520);\n  const fromMin = dispMin, fromMax = dispMax;\n  const start = performance.now();\n  const dur = 450;\n  function step(now) {\n    const t = Math.min(1, (now - start) / dur);\n    const e = 1 - Math.pow(1 - t, 3);\n    dispMin = Math.round(fromMin + (accMin - fromMin) * e);\n    dispMax = Math.round(fromMax + (accMax - fromMax) * e);\n    daysValueEl.textContent = fmtDays(dispMin, dispMax);\n    daysSubEl.textContent = subLabel(dispMin, dispMax);\n    if (t < 1) requestAnimationFrame(step);\n    else snapCounter();\n  }\n  requestAnimationFrame(step);\n}\n\n/* ---------------- Progress ---------------- */\nconst progressText = document.getElementById('progress-text');\nconst progressFill = document.getElementById('progress-fill');\nfunction updateProgress(completedCount, currentStepIndex) {\n  const total = STEPS.length;\n  const shownStep = Math.min(currentStepIndex + 1, total);\n  const phaseName = PHASES[STEPS[Math.min(currentStepIndex, total - 1)].phase - 1].name;\n  progressText.textContent = 'Step ' + shownStep + ' of ' + total;\n  document.getElementById('progress-label').textContent = phaseName;\n  progressFill.style.width = (completedCount / total * 100) + '%';\n}\n\n/* ---------------- Sequential flow ---------------- */\nlet current = 0;\nlet completed = 0;\n\nfunction revealStep(i, animate) {\n  const el = stepEls[i];\n  el.hidden = false;\n  el.classList.add('is-active');\n  if (animate && !reduceMotion) {\n    const card = el.querySelector('.card');\n    card.classList.add('reveal-anim');\n    // Safety: never let content stay stuck at the animation's hidden start\n    // frame (e.g. if the compositor stalls). Strip the class once it's done so\n    // the card falls back to its fully-visible base style no matter what.\n    setTimeout(() => card.classList.remove('reveal-anim'), 650);\n  }\n  // ensure its phase header visible\n  const ph = STEPS[i].phase;\n  phaseEls[ph].hidden = false;\n  // focus management: move focus to the new continue button for keyboard users\n  const btn = el.querySelector('[data-continue]');\n  if (btn && animate) {\n    setTimeout(() => { try { btn.focus({ preventScroll: false }); } catch (e) {} }, animate ? 360 : 0);\n  }\n  moveCarToNode(el.querySelector('.node'), !animate);\n  updateRouteMap();\n}\n\nfunction completeStep(i) {\n  const el = stepEls[i];\n  if (el.classList.contains('is-complete')) return;\n  el.classList.remove('is-active');\n  el.classList.add('is-complete');\n  // collapse continue\n  completed++;\n  accMin += stepDMin(STEPS[i]);\n  accMax += stepDMax(STEPS[i]);\n  animateCounter();\n\n  if (i + 1 < STEPS.length) {\n    current = i + 1;\n    revealStep(i + 1, true);\n    updateProgress(completed, current);\n  } else {\n    updateProgress(completed, STEPS.length - 1);\n    showEnd();\n  }\n}\n\ntimeline.addEventListener('click', (e) => {\n  const btn = e.target.closest('[data-continue]');\n  if (!btn) return;\n  const art = btn.closest('.step');\n  const i = parseInt(art.getAttribute('data-step'), 10);\n  completeStep(i);\n});\n\n/* ---------------- End screen ---------------- */\nconst endscreen = document.getElementById('endscreen');\nconst endDaysNum = document.getElementById('end-days-num');\nfunction showEnd() {\n  endDaysNum.textContent = fmtDays(accMin, accMax);\n  endscreen.hidden = false;\n  // car reaches the destination, then drives on toward \"funded\"\n  if (mode !== 'full' && carShown) {\n    const lastNode = stepEls[STEPS.length - 1].querySelector('.node');\n    moveCarToNode(lastNode, false, 90);\n    setTimeout(() => { roadcar.style.opacity = '0'; }, reduceMotion ? 0 : 700);\n  }\n  const els = ['end-1', 'end-2'].map(id => document.getElementById(id));\n  const delays = reduceMotion ? [0, 0] : [150, 700];\n  els.forEach((el, k) => setTimeout(() => el.classList.add('show'), delays[k]));\n  updateRouteMap();\n}\n\n/* ---------------- Init ---------------- */\nfunction initFull() {\n  // everything visible, all layers, no locking; continue buttons hidden via CSS\n  stepEls.forEach((el, i) => {\n    el.hidden = false;\n    el.classList.add('is-active'); // open look, off-white\n    accMin += stepDMin(STEPS[i]);\n    accMax += stepDMax(STEPS[i]);\n  });\n  Object.values(phaseEls).forEach(p => p.hidden = false);\n  snapCounter();\n  endDaysNum.textContent = fmtDays(accMin, accMax);\n  progressText.textContent = STEPS.length + ' steps';\n  document.getElementById('progress-label').textContent = 'Full journey';\n  progressFill.style.width = '100%';\n  // show end screen statically\n  endscreen.hidden = false;\n  ['end-1','end-2'].forEach(id => document.getElementById(id).classList.add('show'));\n}\n\nfunction initGuided() {\n  // hide all phases & steps, then reveal step 1\n  Object.values(phaseEls).forEach(p => p.hidden = true);\n  stepEls.forEach(el => el.hidden = true);\n  revealStep(0, false);\n  updateProgress(0, 0);\n  daysValueEl.textContent = '0';\n  daysSubEl.textContent = 'working days';\n}\n\n/* ---------------- Mode application (live-switchable) ---------------- */\nfunction resetView() {\n  // wipe flow state\n  current = 0;\n  completed = 0;\n  accMin = 0; accMax = 0; dispMin = 0; dispMax = 0;\n  // clear every step's state + collapse any expanded panels\n  stepEls.forEach(el => {\n    el.classList.remove('is-active', 'is-complete');\n    el.hidden = true;\n    const card = el.querySelector('.card');\n    if (card) card.classList.remove('reveal-anim');\n    el.querySelectorAll('.signal-toggle[aria-expanded=\"true\"]').forEach(ft => {\n      ft.setAttribute('aria-expanded', 'false');\n    });\n    el.querySelectorAll('.signal-panel.open').forEach(p => p.classList.remove('open'));\n    el.querySelectorAll('.greenlight[aria-expanded=\"true\"]').forEach(g => g.setAttribute('aria-expanded', 'false'));\n    el.querySelectorAll('.gl-panel.open').forEach(p => p.classList.remove('open'));\n  });\n  Object.values(phaseEls).forEach(p => p.hidden = true);\n  // reset end screen\n  endscreen.hidden = true;\n  ['end-1','end-2'].forEach(id => document.getElementById(id).classList.remove('show'));\n  // reset progress + counter\n  progressFill.style.width = '0%';\n  // reset car\n  carShown = false;\n  roadcar.style.transition = 'none';\n  roadcar.style.opacity = '0';\n  void roadcar.offsetWidth;\n  roadcar.style.transition = '';\n}\n\nfunction applyMode(newMode) {\n  if (!(newMode in MODE_LEVEL)) newMode = 'base';\n  mode = newMode;\n  level = MODE_LEVEL[mode];\n  showPersona = level >= 1;\n  showStp = level >= 2;\n  showProduct = level >= 3;\n  locking = mode !== 'full';\n\n  document.body.toggleAttribute('data-persona', showPersona);\n  document.body.toggleAttribute('data-stp', showStp);\n  document.body.toggleAttribute('data-product', showProduct);\n  document.body.setAttribute('data-mode', mode);\n  document.getElementById('course-eyebrow').textContent = 'Clutch LAS · Internal Foundations · ' + MODE_LABEL[mode];\n\n  // step accent: product color in fulfillment+, else neutral purple\n  stepEls.forEach((el, i) => {\n    el.style.setProperty('--accent', showProduct ? PHASE_COLOR[STEPS[i].phase] : 'var(--purple)');\n  });\n\n  // switcher active state\n  const curIdx = LESSON_SEQ.indexOf(mode);\n  document.querySelectorAll('[data-setmode]').forEach(b => {\n    const bm = b.getAttribute('data-setmode');\n    const on = bm === mode;\n    b.setAttribute('aria-selected', String(on));\n    b.classList.toggle('is-current', on);\n    if (lessonLock) {\n      const bi = LESSON_SEQ.indexOf(bm);\n      b.classList.toggle('done', !on && bi > -1 && bi < curIdx);\n      b.classList.toggle('upcoming', !on && (bi === -1 || bi > curIdx));\n      b.setAttribute('tabindex', '-1');\n      b.setAttribute('aria-disabled', 'true');\n    }\n  });\n  if (lessonLock && curIdx > -1) {\n    const sc = document.getElementById('ms-stepcount');\n    if (sc) sc.textContent = 'Stage ' + (curIdx + 1) + ' of 4';\n  }\n\n  resetView();\n  if (mode === 'full') initFull();\n  else initGuided();\n  refreshSignalLabels();\n  updateTrafficLights();\n  refreshTimes();\n  updateRouteMap();\n}\n\n/* switcher wiring */\nconst modeswitch = document.getElementById('modeswitch');\nmodeswitch.style.display = 'none'; // single-layer build: hide layer switcher entirely\nif (lessonLock) {\n  document.body.classList.add('locked');\n  const lbl = modeswitch.querySelector('.ms-label');\n  if (lbl) lbl.textContent = 'Journey stage';\n}\nmodeswitch.addEventListener('click', (e) => {\n  if (lessonLock) return;\n  const b = e.target.closest('[data-setmode]');\n  if (!b) return;\n  applyMode(b.getAttribute('data-setmode'));\n  try { history.replaceState(null, '', '?mode=' + mode); } catch (_) {}\n  document.getElementById('app').scrollIntoView({ block: 'start' });\n});\n\napplyMode(mode);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Standalone Layers/01 - Traditional Loan Journey"}
  </script>
