<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Albert+Sans:wght@300;400;600;700&family=Work+Sans:wght@300;400;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #FCFCFC;
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .page-header {
    width: 100%;
    background: #0A074D;
    padding: 32px 20px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6567A1;
    margin-bottom: 6px;
    text-align: center;
  }

  h1 {
    font-family: 'Albert Sans', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #FCFCFC;
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: #9B97CC;
    text-align: center;
  }

  .container { width: 100%; max-width: 840px; padding: 0 20px 48px; }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #9B97CC;
    margin-bottom: 10px;
    text-align: center;
  }

  .path-row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: nowrap;
    margin-bottom: 6px;
  }

  .badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 9px 8px;
    border-radius: 8px;
    width: 112px;
    min-height: 52px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    flex-shrink: 0;
    border: 1.5px solid transparent;
  }

  .badge:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(10,7,77,0.13); }
  .badge:focus-visible { outline: 2px solid #7146B5; outline-offset: 3px; }
  .badge.active { transform: translateY(-2px); box-shadow: 0 0 0 2.5px #0A074D; }

  .badge .label {
    font-family: 'Work Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.3;
    color: inherit;
  }

  .b-decision   { background:#FEF3EA; color:#B5591A; border-color:#F0D4B8; }
  .b-conditions { background:#EAF5EA; color:#276227; border-color:#B8DDB8; }
  .b-docprep    { background:#EAECF4; color:#2D3F99; border-color:#C0C6E0; }
  .b-booking    { background:#EAECF4; color:#2D3F99; border-color:#C0C6E0; }
  .b-inprogress { background:#ECEEF8; color:#2D3F99; border-color:#BCC0E4; }
  .b-funded     { background:#EAF5EA; color:#276227; border-color:#B8DDB8; }
  .b-aan        { background:#FDECEA; color:#B03030; border-color:#F0C0BF; }
  .b-declined   { background:#FDECEA; color:#B03030; border-color:#F0C0BF; }
  .b-cancelled  { background:#FDECEA; color:#B03030; border-color:#F0C0BF; }

  .arrow { color:#C4BEDD; font-size:16px; padding:0 2px; flex-shrink:0; user-select:none; }

  .decline-section { display:flex; flex-direction:column; align-items:center; margin-top: 16px; }

  .info-panel {
    background: #FCFCFC;
    border: 1px solid #DDD5EE;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 24px;
    transition: opacity 0.2s ease;
  }
  .info-panel.hidden { opacity:0; pointer-events:none; height:0; margin:0; border:none; }
  .info-panel.visible { opacity:1; }

  .panel-body { padding: 20px 24px 20px; }

  .ui-pill {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-family: 'Work Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    border: 1.5px solid transparent;
  }

  .pill-decision   { background:#FEF3EA; color:#B5591A; border-color:#F0D4B8; }
  .pill-conditions { background:#EAF5EA; color:#276227; border-color:#B8DDB8; }
  .pill-docprep    { background:#EAECF4; color:#2D3F99; border-color:#C0C6E0; }
  .pill-booking    { background:#EAECF4; color:#2D3F99; border-color:#C0C6E0; }
  .pill-inprogress { background:#ECEEF8; color:#2D3F99; border-color:#BCC0E4; }
  .pill-funded     { background:#EAF5EA; color:#276227; border-color:#B8DDB8; }
  .pill-aan        { background:#FDECEA; color:#B03030; border-color:#F0C0BF; }
  .pill-declined   { background:#FDECEA; color:#B03030; border-color:#F0C0BF; }
  .pill-cancelled  { background:#FDECEA; color:#B03030; border-color:#F0C0BF; }

  .meaning-text {
    font-size: 14px;
    color: #0A074D;
    line-height: 1.65;
    font-family: 'Work Sans', sans-serif;
    font-weight: 400;
  }

  .next-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 24px;
    background: #E4DAEF;
    border: none;
    border-top: 1px solid #D8D0EC;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #0A074D;
    font-weight: 500;
    transition: background 0.15s ease;
  }
  .next-toggle:hover { background: #D8CEE8; }
  .next-toggle:focus-visible { outline: 2px solid #7146B5; outline-offset: -2px; }

  .toggle-chevron {
    font-size: 13px;
    transition: transform 0.2s ease;
    display: inline-block;
  }
  .next-toggle[aria-expanded="true"] .toggle-chevron { transform: rotate(180deg); }

  .next-content {
    background: #0A074D;
    padding: 18px 24px;
    display: none;
  }
  .next-content.open { display: block; }

  .next-content p {
    font-size: 14px;
    color: #C4C0E8;
    line-height: 1.65;
    font-family: 'Work Sans', sans-serif;
    font-weight: 400;
  }

  .next-note {
    display: block;
    margin-top: 10px;
    font-size: 12px;
    color: #B8B3D8;
    font-style: italic;
  }

  .status-ref { font-weight: 700; color: #A882E0; }

  .btn-ref {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    background: #1A1760;
    color: #FCFCFC;
    border: 1px solid #3A3880;
    border-radius: 4px;
    padding: 1px 6px;
  }

  .cancelled-row {
    display:flex; align-items:center; justify-content:center;
    gap:12px; margin-top:20px; padding-top:18px;
    border-top: 1px solid #D8D0EC;
  }

  .cancelled-note {
    font-size: 13px;
    color: #6567A1;
    font-family: 'Work Sans', sans-serif;
    line-height: 1.5;
  }

  .hint {
    text-align: center;
    font-size: 11px;
    color: #B8B3D8;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.08em;
    margin-top: 14px;
  }

  .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
  @media (prefers-reduced-motion: reduce) { * { transition-duration: 0.01ms !important; } }
</style>
</head>
<body>

  <header class="page-header">
    <p class="eyebrow">Clutch LAS · Fulfillment in the Staff Portal</p>
    <h1>Application Lifecycle</h1>
    <p class="subtitle">Click any status to learn what it means and what comes next.</p>
  </header>

  <div class="container" role="main">
    <h2 class="sr-only">Interactive application lifecycle diagram.</h2>

    <p class="section-label">Happy path</p>
    <div class="path-row">
      <button class="badge b-decision" onclick="show('decision')" id="btn-decision" aria-label="Needs Decision"><span class="label">Needs<br>Decision</span></button>
      <span class="arrow" aria-hidden="true">→</span>
      <button class="badge b-conditions" onclick="show('conditions')" id="btn-conditions" aria-label="Approved with Conditions"><span class="label">Approved<br>w/ Conditions</span></button>
      <span class="arrow" aria-hidden="true">→</span>
      <button class="badge b-docprep" onclick="show('docprep')" id="btn-docprep" aria-label="Doc Prep"><span class="label">Doc Prep</span></button>
      <span class="arrow" aria-hidden="true">→</span>
      <button class="badge b-booking" onclick="show('booking')" id="btn-booking" aria-label="Needs Booking"><span class="label">Needs<br>Booking</span></button>
      <span class="arrow" aria-hidden="true">→</span>
      <button class="badge b-inprogress" onclick="show('inprogress')" id="btn-inprogress" aria-label="Booking in Progress"><span class="label">Booking<br>in Progress</span></button>
      <span class="arrow" aria-hidden="true">→</span>
      <button class="badge b-funded" onclick="show('funded')" id="btn-funded" aria-label="Funded">
        <span class="label">Funded</span>
      </button>
    </div>

    <div class="decline-section">
      <p class="section-label">Decline path</p>
      <div class="path-row">
        <button class="badge b-aan" onclick="show('aan')" id="btn-aan" aria-label="Pending AAN"><span class="label">Pending<br>AAN</span></button>
        <span class="arrow" aria-hidden="true">→</span>
        <button class="badge b-declined" onclick="show('declined')" id="btn-declined" aria-label="Declined">
          <span class="label">Declined</span>
        </button>
      </div>
    </div>

    <div class="cancelled-row">
      <button class="badge b-cancelled" onclick="show('cancelled')" id="btn-cancelled" style="width:96px;min-height:48px;" aria-label="Cancelled">
        <span class="label">Cancelled</span>
      </button>
      <p class="cancelled-note">Possible at any point<br>before the loan closes</p>
    </div>

    <div class="info-panel hidden" id="info-panel" role="region" aria-live="polite" aria-label="Status details">
      <div class="panel-body">
        <div id="panel-pill" class="ui-pill"></div>
        <p class="meaning-text" id="panel-meaning"></p>
      </div>
      <button class="next-toggle" id="next-toggle" onclick="toggleNext()" aria-expanded="false" aria-controls="next-content">
        <span>What's next?</span>
        <span class="toggle-chevron" aria-hidden="true">↓</span>
      </button>
      <div class="next-content" id="next-content" role="region">
        <p id="panel-next"></p>
      </div>
    </div>

    <p class="hint" id="hint-text">↑ click any status to explore</p>
  </div>

<script>
const data = {
  decision: {
    name: "Needs Decision",
    pillClass: "pill-decision",
    meaning: "The application is waiting for an underwriting decision — either because it landed in the queue from STP, or because a material change pushed it back for re-review.",
    next: "Review the credit profile and make the call. Approve, counter-offer, or decline in the action bar."
  },
  conditions: {
    name: "Approved with Conditions",
    pillClass: "pill-conditions",
    meaning: "The loan was approved, but outstanding tasks — generated automatically by the Loan Policy Engine — must be resolved before closing can proceed.",
    next: "Complete the open tasks. Once all conditions are cleared, the system automatically advances the application to {Doc Prep}."
  },
  docprep: {
    name: "Doc Prep",
    pillClass: "pill-docprep",
    meaning: "Conditions are cleared and the loan is approved. Ready to generate closing documents.",
    next: "Configure disbursements and protection products in the Closing tab, then click [Generate Docs] in the action bar. The system generates the full closing package and sends it for signature."
  },
  booking: {
    name: "Needs Booking",
    pillClass: "pill-booking",
    meaning: "Documents have been generated and signed. The application is ready to be booked to core.",
    next: "Click [Book Loan] in the action bar. The system validates prerequisites, asks for confirmation, and books the loan to core."
  },
  inprogress: {
    name: "Booking in Progress",
    pillClass: "pill-inprogress",
    meaning: "Booking has been initiated. The application is locked while the system completes the core banking write — edits and reprocessing are blocked during this window.",
    next: "The system completes the booking and disburses funds, then advances to {Funded}. If it fails, the application reverts to {Needs Booking} for a retry."
  },
  funded: {
    name: "Funded",
    pillClass: "pill-funded",
    meaning: "The loan is fully booked and funds have been disbursed to the member. This is the finish line — there's nothing left to do on this application.",
    next: "Everything is golden and the member is funded. 🎉"
  },
  aan: {
    name: "Pending AAN",
    pillClass: "pill-aan",
    meaning: "The decision is decline. Before the application can close, an Adverse Action Notice (AAN) must be generated and sent to the member.",
    next: "Click [Generate AAN] in the action bar. Once it's sent, the application moves to {Declined} and closes.<span class='next-note'>Note: AAN delivery may be automatic depending on your credit union's configuration.</span>"
  },
  declined: {
    name: "Declined",
    pillClass: "pill-declined",
    meaning: "The Adverse Action Notice (AAN) has been generated (and sent, if your credit union has auto-AAN sending enabled). The application is now closed.",
    next: "This one's done. The decision has been communicated and the application is closed. Not every loan is the right fit — and you handled it with care."
  },
  cancelled: {
    name: "Cancelled",
    pillClass: "pill-cancelled",
    meaning: "The application was closed before it reached a final outcome. This can happen when you cancel it manually, or when the system closes it automatically — for example, when a counter-offer expires after 30 days without a response from the member.",
    next: "Nothing left to do here. If the member wants to move forward, a new application will need to be submitted."
  }
};

function renderText(text) {
  return text
    .replace(/\{([^}]+)\}/g, '<strong class="status-ref">$1</strong>')
    .replace(/\[([^\]]+)\]/g, '<span class="btn-ref">$1</span>');
}

let active = null;
let nextOpen = false;

function toggleNext() {
  nextOpen = !nextOpen;
  const content = document.getElementById('next-content');
  const toggle = document.getElementById('next-toggle');
  content.classList.toggle('open', nextOpen);
  toggle.setAttribute('aria-expanded', String(nextOpen));
}

function show(key) {
  if (active) {
    const prev = document.getElementById('btn-' + active);
    if (prev) { prev.classList.remove('active'); prev.setAttribute('aria-pressed','false'); }
  }
  if (active === key) {
    active = null;
    document.getElementById('info-panel').className = 'info-panel hidden';
    document.getElementById('hint-text').style.display = 'block';
    return;
  }

  nextOpen = false;
  document.getElementById('next-content').classList.remove('open');
  document.getElementById('next-toggle').setAttribute('aria-expanded', 'false');

  active = key;
  const d = data[key];
  const btn = document.getElementById('btn-' + key);
  if (btn) { btn.classList.add('active'); btn.setAttribute('aria-pressed','true'); }

  const pill = document.getElementById('panel-pill');
  pill.textContent = d.name;
  pill.className = 'ui-pill ' + d.pillClass;

  document.getElementById('panel-meaning').innerHTML = renderText(d.meaning);
  document.getElementById('panel-next').innerHTML = renderText(d.next);

  document.getElementById('info-panel').className = 'info-panel visible';
  document.getElementById('hint-text').style.display = 'none';
}

document.querySelectorAll('.badge').forEach(btn => {
  btn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
  });
});
</script>
</body>
</html>
