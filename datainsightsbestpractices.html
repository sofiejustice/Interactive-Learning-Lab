  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  --text-primary: var(--dark-blue);\n  --text-secondary: var(--eyebrow-grey);\n  --text-tertiary: #8B8FB0;\n  --border: #E3E0EE;\n  --surface: #FFFFFF;\n  --surface-neutral: var(--off-white);\n\n  /* Sigma chart palette — faithful to source PNGs */\n  --sg-navy: #2D2670;          /* ORIGINAL, deep funnel */\n  --sg-purple: #6F65C2;        /* mid funnel, techcu line, second tier */\n  --sg-lavender: #BBB4DE;      /* top of funnel, light fill */\n  --sg-pale: #DCD8EE;          /* very light fill */\n  --sg-olive: #97A641;         /* benchmark, remarketing */\n  --sg-gold: #E5C24E;          /* loan cross-sell, tag charts */\n  --sg-orange: #E68641;        /* personal, deposit cross-sell */\n  --sg-coral: #D85F4A;         /* denied / negative */\n  --sg-steel: #5489C9;         /* credit card */\n  --sg-fresh: #5BAA66;         /* vehicle */\n  --sg-membership: #9D97D6;    /* new membership pale purple */\n  --sg-bg: #F5F4FB;            /* chart card background */\n  --sg-title: #1F2747;         /* chart title navy */\n  --sg-axis: #6B7390;          /* axis label gray */\n  --sg-grid: rgba(31, 39, 71, 0.08);\n\n  /* Layout */\n  --radius-card: 12px;\n  --radius-pill: 9999px;\n  --shadow-card: 0px 4px 24px -2px rgba(47, 57, 76, 0.08);\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  font-family: \"Albert Sans\", -apple-system, system-ui, sans-serif;\n  font-weight: 400;\n  background: var(--surface-neutral);\n  color: var(--text-primary);\n  line-height: 1.45;\n  -webkit-font-smoothing: antialiased;\n}\n\nbutton { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }\na { color: inherit; text-decoration: none; }\n\n/* ─────── MAIN LAYOUT (sidebar spans whole page) ─────── */\n.main-layout {\n  display: grid;\n  grid-template-columns: 240px 1fr;\n  align-items: start;\n  background: var(--surface-neutral);\n  min-height: calc(100vh - 64px);\n}\n.sidebar {\n  position: sticky;\n  top: 64px;\n  align-self: start;\n  padding: 28px 12px 28px 24px;\n  border-right: 1px solid var(--border);\n  height: calc(100vh - 64px);\n  overflow-y: auto;\n  background: var(--off-white);\n}\n.sidebar-inner { display: flex; flex-direction: column; gap: 24px; height: 100%; }\n.sidebar-eyebrow {\n  font-size: 10.5px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--eyebrow-grey);\n  margin-bottom: 10px;\n  padding-left: 12px;\n}\n.sidebar-nav { display: flex; flex-direction: column; gap: 2px; }\n.sidebar-nav a {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 9px 12px;\n  border-radius: 8px;\n  color: var(--text-primary);\n  font-weight: 500;\n  font-size: 13.5px;\n  transition: all 0.15s ease;\n  position: relative;\n}\n.sidebar-nav a:hover {\n  background: var(--lavender);\n  color: var(--partner);\n}\n.sidebar-nav a.active {\n  background: var(--partner);\n  color: white;\n}\n.sidebar-nav a.active .sb-count { background: rgba(255,255,255,0.22); color: white; }\n.sidebar-nav a .sb-icon {\n  width: 18px; height: 18px;\n  flex-shrink: 0;\n  display: grid; place-items: center;\n}\n.sidebar-nav a .sb-icon svg { width: 17px; height: 17px; }\n.sidebar-nav a .sb-label { flex: 1; }\n.sb-count {\n  font-size: 11px;\n  font-weight: 600;\n  padding: 1px 8px;\n  border-radius: 999px;\n  background: var(--lavender);\n  color: var(--partner);\n}\n.sidebar-tip {\n  background: linear-gradient(160deg, var(--dark-blue), #1a1670);\n  color: white;\n  border-radius: 12px;\n  padding: 16px;\n  margin-top: auto;\n}\n.sidebar-tip-head {\n  display: flex; align-items: center; gap: 6px;\n  font-size: 10px;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--orange-accent);\n  margin-bottom: 8px;\n}\n.sidebar-tip h5 {\n  font-size: 13.5px; font-weight: 600;\n  line-height: 1.3;\n  margin-bottom: 5px;\n}\n.sidebar-tip p {\n  font-size: 11.5px;\n  opacity: 0.75;\n  line-height: 1.5;\n}\n\n.main-content { min-width: 0; background: var(--surface-neutral); }\n\n/* ─────── NAV (top bar) ─────── */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 100;\n  background: var(--surface);\n  border-bottom: 1px solid var(--border);\n  height: 64px;\n  display: flex;\n  align-items: center;\n  padding: 0 32px;\n  gap: 32px;\n}\n.nav-brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-weight: 700;\n  font-size: 16px;\n  color: var(--text-primary);\n}\n.nav-brand-dot {\n  width: 24px;\n  height: 24px;\n  border-radius: 6px;\n  background: var(--partner);\n  display: grid;\n  place-items: center;\n  color: white;\n  font-size: 13px;\n  font-weight: 800;\n}\n.nav-brand-tag {\n  font-size: 11px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  padding-left: 10px;\n  border-left: 1px solid var(--border);\n  margin-left: 4px;\n}\n.nav-tiny {\n  display: flex;\n  gap: 4px;\n  margin-left: auto;\n  align-items: center;\n}\n.nav-tiny a {\n  font-size: 12px;\n  font-weight: 500;\n  color: var(--text-tertiary);\n  padding: 6px 10px;\n  border-radius: 6px;\n  transition: all 0.15s;\n}\n.nav-tiny a:hover { color: var(--partner); background: var(--partner-lighter); }\n.nav-tiny a.active { color: var(--partner); }\n\n/* ─────── PATH PICKER ─────── */\n.path-picker {\n  background: var(--surface);\n  padding: 0 32px;\n  margin-top: -36px;\n  position: relative;\n  z-index: 5;\n}\n.path-picker-inner {\n  max-width: 1240px;\n  margin: 0 auto;\n}\n.path-picker-head {\n  padding: 56px 0 28px;\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  gap: 24px;\n}\n.path-picker-head h2 {\n  font-size: 24px;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n}\n.path-picker-head p {\n  font-size: 14px;\n  color: var(--text-secondary);\n}\n.path-picker-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 16px;\n  padding-bottom: 56px;\n}\n.path-card {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  padding: 24px;\n  border: 1px solid var(--border);\n  border-radius: 16px;\n  background: var(--surface);\n  transition: all 0.2s ease;\n  position: relative;\n  overflow: hidden;\n  color: var(--text-primary);\n  min-height: 220px;\n}\n.path-card::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background: var(--card-accent, var(--partner));\n  opacity: 0;\n  transition: opacity 0.2s ease;\n  pointer-events: none;\n}\n.path-card[data-accent=\"purple\"] { --card-accent: var(--partner); --card-accent-soft: var(--partner-lighter); }\n.path-card[data-accent=\"navy\"]   { --card-accent: var(--sg-navy); --card-accent-soft: rgba(45, 38, 112, 0.08); }\n.path-card[data-accent=\"steel\"]  { --card-accent: var(--sg-steel); --card-accent-soft: rgba(84, 137, 201, 0.10); }\n.path-card[data-accent=\"olive\"]  { --card-accent: var(--sg-olive); --card-accent-soft: rgba(151, 166, 65, 0.14); }\n.path-card:hover {\n  border-color: var(--card-accent);\n  transform: translateY(-2px);\n  box-shadow: 0px 8px 24px -8px rgba(31, 39, 71, 0.18);\n}\n.path-card-icon {\n  width: 44px;\n  height: 44px;\n  border-radius: 12px;\n  background: var(--card-accent-soft);\n  color: var(--card-accent);\n  display: grid;\n  place-items: center;\n  margin-bottom: 4px;\n}\n.path-card-eyebrow {\n  font-size: 11px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--text-tertiary);\n}\n.path-card h3 {\n  font-size: 22px;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n  line-height: 1.1;\n}\n.path-card p {\n  font-size: 13.5px;\n  color: var(--text-secondary);\n  line-height: 1.45;\n  flex: 1;\n}\n.path-card-cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--card-accent);\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  margin-top: 8px;\n}\n.path-card:hover .path-card-cta svg { transform: translateX(2px); }\n.path-card-cta svg { transition: transform 0.2s; }\n\n/* ─────── NAV (top bar — minimal) ─────── */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 100;\n  background: var(--surface);\n  border-bottom: 1px solid var(--border);\n  height: 64px;\n  display: flex;\n  align-items: center;\n  padding: 0 28px;\n  gap: 32px;\n}\n.nav-brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-weight: 700;\n  font-size: 16px;\n  color: var(--text-primary);\n}\n.nav-brand-dot {\n  width: 26px;\n  height: 26px;\n  border-radius: 7px;\n  background: var(--partner);\n  display: grid;\n  place-items: center;\n  color: white;\n  font-size: 14px;\n  font-weight: 800;\n}\n.nav-brand-tag {\n  font-size: 11px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  padding-left: 12px;\n  border-left: 1px solid var(--border);\n  margin-left: 6px;\n}\n.nav-meta {\n  margin-left: auto;\n  display: flex;\n  gap: 6px;\n  align-items: center;\n}\n.nav-meta-chip {\n  font-size: 11px;\n  font-weight: 600;\n  padding: 5px 10px;\n  border-radius: 999px;\n  background: var(--surface-neutral);\n  color: var(--eyebrow-grey);\n  letter-spacing: 0.02em;\n  border: 1px solid var(--border);\n}\n\n/* ─────── HERO (left-aligned, with animation) ─────── */\n.hero {\n  background: var(--partner);\n  color: white;\n  padding: 56px 48px 64px;\n  position: relative;\n  overflow: hidden;\n}\n.hero::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background:\n    radial-gradient(circle at 90% 40%, rgba(255,255,255,0.10) 0%, transparent 50%),\n    radial-gradient(circle at 10% 100%, rgba(10, 7, 77, 0.45) 0%, transparent 55%);\n  pointer-events: none;\n}\n.hero-inner {\n  position: relative;\n  display: grid;\n  grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr);\n  gap: 48px;\n  align-items: center;\n  max-width: 1180px;\n  margin: 0;\n}\n.hero-text { max-width: 600px; }\n.hero-eyebrow {\n  display: inline-block;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  font-size: 11px;\n  font-weight: 600;\n  opacity: 0.78;\n  padding: 4px 10px;\n  border-radius: 6px;\n  background: rgba(255,255,255,0.14);\n  margin-bottom: 18px;\n}\n.hero h1 {\n  font-size: clamp(28px, 3.4vw, 42px);\n  line-height: 1.08;\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  margin-bottom: 16px;\n}\n.hero h1 em {\n  font-style: normal;\n  background: linear-gradient(180deg, transparent 60%, rgba(246, 135, 51, 0.45) 60%);\n  padding: 0 4px;\n}\n.hero p {\n  font-size: 15.5px;\n  opacity: 0.86;\n  line-height: 1.55;\n  font-weight: 400;\n  margin-bottom: 24px;\n}\n.hero-cta-row {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  flex-wrap: wrap;\n}\n.hero-cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 10px 18px;\n  font-size: 14px;\n  font-weight: 600;\n  border-radius: 10px;\n  transition: all 0.15s ease;\n}\n.hero-cta.primary {\n  background: white;\n  color: var(--partner);\n}\n.hero-cta.primary:hover {\n  background: var(--lavender);\n  transform: translateY(-1px);\n}\n.hero-cta.primary svg { transition: transform 0.15s; }\n.hero-cta.primary:hover svg { transform: translateX(3px); }\n.hero-cta.ghost {\n  color: white;\n  border: 1px solid rgba(255,255,255,0.30);\n}\n.hero-cta.ghost:hover {\n  background: rgba(255,255,255,0.10);\n}\n\n/* Animated illustration */\n.hero-anim {\n  position: relative;\n  width: 100%;\n  max-width: 400px;\n  justify-self: end;\n}\n.hero-anim svg { width: 100%; height: auto; display: block; overflow: visible; }\n\n/* Bars — use transform scaleY (universally supported) */\n.hero-bar {\n  transform-box: fill-box;\n  transform-origin: bottom;\n  animation: barWave 4.5s ease-in-out infinite;\n}\n.hero-bar.b1 { animation-delay: 0s;   }\n.hero-bar.b2 { animation-delay: 0.18s; }\n.hero-bar.b3 { animation-delay: 0.36s; }\n.hero-bar.b4 { animation-delay: 0.54s; }\n.hero-bar.b5 { animation-delay: 0.72s; }\n@keyframes barWave {\n  0%, 100% { transform: scaleY(0.35); }\n  50%      { transform: scaleY(1); }\n}\n\n/* Line drawing */\n.hero-trend {\n  stroke-dasharray: 180;\n  stroke-dashoffset: 180;\n  animation: drawLine 4.5s ease-in-out infinite;\n}\n@keyframes drawLine {\n  0%   { stroke-dashoffset: 180; }\n  40%  { stroke-dashoffset: 0; }\n  90%  { stroke-dashoffset: 0; }\n  100% { stroke-dashoffset: 180; }\n}\n\n/* Pulse dot — animate via SVG circle r */\n.hero-pulse {\n  transform-box: fill-box;\n  transform-origin: center;\n  animation: pulseDot 1.8s ease-out infinite;\n}\n@keyframes pulseDot {\n  0%   { transform: scale(0.6); opacity: 0.6; }\n  100% { transform: scale(3.2); opacity: 0; }\n}\n\n/* Floating chip subtle bob */\n.hero-chip {\n  animation: floatChip 5s ease-in-out infinite;\n}\n@keyframes floatChip {\n  0%, 100% { transform: translate(208px, 188px); }\n  50%      { transform: translate(208px, 182px); }\n}\n\n/* Funnel bar fills + drains */\n.hero-funnel-fill {\n  animation: funnelFill 4.5s ease-in-out infinite;\n}\n@keyframes funnelFill {\n  0%       { width: 6px; }\n  50%      { width: 130px; }\n  100%     { width: 6px; }\n}\n\n/* ─────── SECTION ─────── */\n.section {\n  max-width: 1240px;\n  margin: 0 auto;\n  padding: 80px 32px;\n}\n.section-header {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  gap: 32px;\n  margin-bottom: 48px;\n  padding-bottom: 24px;\n  border-bottom: 1px solid var(--border);\n}\n.section-eyebrow {\n  display: inline-block;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--partner);\n  background: var(--partner-lighter);\n  padding: 4px 10px;\n  border-radius: 6px;\n  margin-bottom: 12px;\n}\n.section-header h2 {\n  font-size: 40px;\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  line-height: 1;\n  margin-bottom: 12px;\n}\n.section-header p {\n  font-size: 16px;\n  color: var(--text-secondary);\n  max-width: 520px;\n  line-height: 1.5;\n}\n.section-meta {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 12px;\n  color: var(--text-tertiary);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  font-weight: 500;\n  white-space: nowrap;\n}\n.section-meta-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: var(--sg-fresh);\n  box-shadow: 0 0 0 4px rgba(91, 170, 102, 0.18);\n}\n\n/* ─────── MINDSET FLASHCARDS ─────── */\n#mindset { background: var(--surface); }\n\n.flashcard-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 18px;\n  perspective: 1400px;\n}\n\n.flashcard {\n  position: relative;\n  background: transparent;\n  border: none;\n  padding: 0;\n  cursor: pointer;\n  text-align: left;\n  font-family: inherit;\n  min-height: 310px;\n  perspective: 1200px;\n}\n\n.flashcard-inner {\n  position: relative;\n  width: 100%;\n  height: 100%;\n  min-height: 310px;\n  transition: transform 0.65s cubic-bezier(0.4, 0.0, 0.2, 1);\n  transform-style: preserve-3d;\n}\n.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }\n\n.flashcard-face {\n  position: absolute;\n  inset: 0;\n  border-radius: 18px;\n  padding: 22px 24px 18px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  -webkit-backface-visibility: hidden;\n          backface-visibility: hidden;\n  box-shadow: 0 6px 18px -10px rgba(31, 39, 71, 0.18);\n  border: 1px solid var(--border);\n}\n\n/* FRONT — lavender card, light purple numeral */\n.flashcard-front {\n  background: linear-gradient(160deg, var(--off-white) 0%, var(--lavender) 100%);\n}\n.flashcard-num {\n  font-size: 64px;\n  font-weight: 800;\n  line-height: 0.85;\n  letter-spacing: -0.04em;\n  color: var(--partner-light);\n  font-feature-settings: \"tnum\";\n  margin-bottom: 4px;\n}\n.flashcard-front-body {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  flex: 1;\n}\n.flashcard-tag {\n  display: inline-block;\n  width: fit-content;\n  font-size: 10.5px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  padding: 3px 8px;\n  border-radius: 5px;\n  background: rgba(113, 70, 181, 0.10);\n  color: var(--partner);\n}\n.flashcard-front h3 {\n  font-size: 17px;\n  font-weight: 700;\n  line-height: 1.25;\n  letter-spacing: -0.01em;\n  color: var(--dark-blue);\n  font-family: \"Albert Sans\", sans-serif;\n}\n.flashcard-front p {\n  font-size: 13px;\n  line-height: 1.5;\n  color: var(--text-secondary);\n}\n.flashcard-flip-hint {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--partner);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  margin-top: auto;\n  padding-top: 8px;\n  border-top: 1px solid rgba(113, 70, 181, 0.18);\n}\n\n/* BACK — purple card with full explanation */\n.flashcard-back {\n  background: linear-gradient(160deg, var(--partner) 0%, #5d3899 100%);\n  color: white;\n  transform: rotateY(180deg);\n  border-color: var(--partner);\n}\n.flashcard-back-head {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n}\n.flashcard-back-num {\n  font-size: 30px;\n  font-weight: 800;\n  line-height: 0.9;\n  letter-spacing: -0.03em;\n  color: var(--orange-accent);\n  font-feature-settings: \"tnum\";\n}\n.flashcard-back-tag {\n  display: inline-block;\n  font-size: 10px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  padding: 2px 7px;\n  border-radius: 4px;\n  background: rgba(255, 255, 255, 0.18);\n  color: white;\n  margin-bottom: 4px;\n}\n.flashcard-back h4 {\n  font-size: 15px;\n  font-weight: 700;\n  line-height: 1.2;\n  letter-spacing: -0.01em;\n  color: white;\n}\n.flashcard-back-body {\n  flex: 1;\n  overflow-y: auto;\n}\n.flashcard-back-body p {\n  font-size: 13px;\n  line-height: 1.55;\n  color: rgba(255, 255, 255, 0.88);\n}\n.flashcard-back-body strong { color: white; font-weight: 600; }\n.flashcard-back-body em { font-style: italic; color: rgba(255,255,255,0.95); }\n.flashcard-back .flashcard-flip-hint {\n  color: rgba(255, 255, 255, 0.78);\n  border-top-color: rgba(255, 255, 255, 0.22);\n}\n\n/* Hover: subtle lift + lavender wash on the front */\n.flashcard:hover:not(.flipped) .flashcard-inner {\n  transform: translateY(-3px);\n}\n.flashcard:hover:not(.flipped) .flashcard-front {\n  border-color: var(--partner);\n  box-shadow: 0 10px 24px -10px rgba(113, 70, 181, 0.30);\n}\n\n@media (max-width: 1100px) {\n  .flashcard-grid { grid-template-columns: repeat(2, 1fr); }\n}\n@media (max-width: 640px) {\n  .flashcard-grid { grid-template-columns: 1fr; }\n  .flashcard, .flashcard-inner { min-height: 280px; }\n}\n\n/* ─────── MINDSET SLIDESHOW (kept for how-to-read) ─────── */\n.mindset-slideshow {\n  position: relative;\n  display: grid;\n  grid-template-columns: 56px 1fr 56px;\n  align-items: stretch;\n  gap: 16px;\n  margin-bottom: 16px;\n}\n.mindset-stage {\n  position: relative;\n  background: linear-gradient(135deg, var(--partner) 0%, #5d3899 100%);\n  color: white;\n  border-radius: 20px;\n  min-height: 380px;\n  overflow: hidden;\n  box-shadow: 0 12px 32px -16px rgba(113, 70, 181, 0.35);\n}\n.mindset-stage::before {\n  content: \"\";\n  position: absolute;\n  top: -120px; right: -80px;\n  width: 360px; height: 360px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(246, 135, 51, 0.16) 0%, transparent 65%);\n  pointer-events: none;\n}\n.mindset-stage::after {\n  content: \"\";\n  position: absolute;\n  bottom: -100px; left: -60px;\n  width: 260px; height: 260px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(238, 230, 245, 0.10) 0%, transparent 70%);\n  pointer-events: none;\n}\n\n.mindset-slide {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  grid-template-columns: 220px 1fr;\n  align-items: center;\n  padding: 40px 48px;\n  gap: 40px;\n  opacity: 0;\n  transform: translateY(8px);\n  pointer-events: none;\n  transition: opacity 0.5s ease, transform 0.5s ease;\n}\n.mindset-slide.active {\n  opacity: 1;\n  transform: translateY(0);\n  pointer-events: auto;\n}\n\n.mindset-slide-side {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n}\n.mindset-slide-num {\n  font-size: 96px;\n  font-weight: 800;\n  line-height: 0.85;\n  letter-spacing: -0.04em;\n  color: var(--lavender);\n  font-feature-settings: \"tnum\";\n}\n.mindset-slide.slide-orange .mindset-slide-num {\n  color: var(--orange-accent);\n}\n.mindset-slide-counter {\n  font-size: 11px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  color: rgba(255, 255, 255, 0.65);\n}\n\n.mindset-slide-body { display: flex; flex-direction: column; gap: 14px; }\n.mindset-slide-tag {\n  display: inline-block;\n  width: fit-content;\n  font-size: 11px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  padding: 4px 10px;\n  border-radius: 6px;\n  background: rgba(255, 255, 255, 0.16);\n  color: white;\n}\n.mindset-slide-body h3 {\n  font-size: clamp(24px, 2.2vw, 32px);\n  font-weight: 700;\n  letter-spacing: -0.015em;\n  line-height: 1.15;\n  color: white;\n  font-family: \"Albert Sans\", sans-serif;\n}\n.mindset-slide-lead {\n  font-size: 17px;\n  font-weight: 400;\n  line-height: 1.5;\n  color: rgba(255, 255, 255, 0.92);\n}\n.mindset-slide-full {\n  font-size: 14px;\n  line-height: 1.6;\n  color: rgba(255, 255, 255, 0.72);\n  margin-top: 4px;\n  padding-top: 16px;\n  border-top: 1px solid rgba(255, 255, 255, 0.18);\n}\n.mindset-slide-full strong { color: white; font-weight: 600; }\n\n.mindset-arrow {\n  width: 56px;\n  height: 56px;\n  align-self: center;\n  border-radius: 50%;\n  background: var(--surface);\n  color: var(--partner);\n  border: 1px solid var(--border);\n  display: grid;\n  place-items: center;\n  transition: all 0.15s ease;\n  box-shadow: 0 6px 18px -10px rgba(31, 39, 71, 0.25);\n  cursor: pointer;\n}\n.mindset-arrow:hover {\n  background: var(--partner);\n  color: white;\n  border-color: var(--partner);\n  transform: scale(1.06);\n}\n.mindset-arrow:active { transform: scale(0.98); }\n\n.mindset-controls {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 0 72px;\n}\n.mindset-dots { display: flex; gap: 8px; }\n.mindset-dot {\n  width: 28px;\n  height: 28px;\n  border-radius: 999px;\n  background: transparent;\n  border: none;\n  padding: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  cursor: pointer;\n}\n.mindset-dot span {\n  display: block;\n  width: 10px;\n  height: 10px;\n  border-radius: 50%;\n  background: var(--border);\n  transition: all 0.2s ease;\n}\n.mindset-dot:hover span { background: var(--partner-light); }\n.mindset-dot.active span {\n  width: 32px;\n  border-radius: 5px;\n  background: var(--partner);\n}\n\n.mindset-autoplay { display: none; }\n.mindset-counter {\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--text-tertiary);\n  letter-spacing: 0.04em;\n  font-feature-settings: \"tnum\";\n}\n\n/* How-to-read uses the same slideshow chrome but with orange numerals + tighter look */\n.how-to-slideshow .mindset-stage {\n  background: linear-gradient(135deg, var(--dark-blue) 0%, #1a1670 100%);\n  box-shadow: 0 12px 32px -16px rgba(10, 7, 77, 0.35);\n  min-height: 340px;\n}\n.how-to-slideshow .mindset-stage::before {\n  background: radial-gradient(circle, rgba(246, 135, 51, 0.22) 0%, transparent 65%);\n}\n\n/* ─────── Section padding between slideshow sections ─────── */\n#mindset .section { padding-bottom: 64px; }\n#how-to-read { background: var(--off-white); }\n#how-to-read .section { padding-top: 96px; padding-bottom: 96px; }\n#how-to-read .section-header { margin-bottom: 32px; padding-bottom: 20px; }\n\n@media (max-width: 900px) {\n  .mindset-slideshow { grid-template-columns: 40px 1fr 40px; gap: 8px; }\n  .mindset-arrow { width: 40px; height: 40px; }\n  .mindset-slide { grid-template-columns: 1fr; padding: 28px 24px; gap: 12px; }\n  .mindset-slide-side { flex-direction: row; align-items: center; gap: 16px; }\n  .mindset-slide-num { font-size: 64px; }\n  .mindset-stage { min-height: 460px; }\n  .mindset-controls { padding: 0 8px; }\n}\n\n/* ─────── HOW TO READ A CHART (callout) ─────── */\n.how-to {\n  margin-top: 56px;\n  background: linear-gradient(135deg, var(--sg-navy) 0%, #3D3585 100%);\n  color: white;\n  border-radius: 20px;\n  padding: 40px;\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr 1fr;\n  gap: 32px;\n  position: relative;\n  overflow: hidden;\n}\n.how-to::before {\n  content: \"\";\n  position: absolute;\n  top: -50px;\n  right: -50px;\n  width: 200px;\n  height: 200px;\n  border-radius: 50%;\n  background: rgba(255,255,255,0.06);\n}\n.how-to-header {\n  grid-column: 1 / -1;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-bottom: 8px;\n}\n.how-to-header h3 {\n  font-size: 22px;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n}\n.how-to-header .badge {\n  font-size: 11px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  padding: 4px 10px;\n  background: rgba(255,255,255,0.14);\n  border-radius: 6px;\n}\n.how-to-step {\n  position: relative;\n  padding-left: 0;\n}\n.how-to-step .step-num {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  background: rgba(255,255,255,0.16);\n  color: white;\n  font-size: 13px;\n  font-weight: 700;\n  margin-bottom: 12px;\n}\n.how-to-step h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }\n.how-to-step p { font-size: 13px; opacity: 0.75; line-height: 1.5; }\n\n/* ─────── SECTION TOOLBAR (search + subsection tabs) ─────── */\n/* \"View by topic, or search the charts\" banner — explicit signpost */\n.toolbar-banner {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  margin: 4px 0 0;\n  padding: 14px 20px;\n  background: var(--partner-lighter);\n  border: 1px solid var(--partner-light);\n  border-bottom: none;\n  border-radius: 14px 14px 0 0;\n  color: var(--text-primary);\n}\n#deposits .toolbar-banner { background: var(--partner-lighter); }\n.toolbar-banner-icon {\n  width: 38px;\n  height: 38px;\n  border-radius: 10px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  background: var(--partner);\n  color: white;\n  flex-shrink: 0;\n  box-shadow: 0 2px 8px rgba(113, 70, 181, 0.25);\n}\n.toolbar-banner-text { flex: 1; min-width: 0; }\n.toolbar-banner-text h4 {\n  font-size: 15px;\n  font-weight: 700;\n  color: var(--text-primary);\n  letter-spacing: -0.01em;\n  margin: 0 0 2px;\n  line-height: 1.2;\n}\n.toolbar-banner-text p {\n  font-size: 12.5px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  margin: 0;\n  line-height: 1.35;\n}\n.toolbar-banner-arrow {\n  color: var(--partner);\n  display: flex;\n  align-items: center;\n  animation: toolbar-nudge 2.6s ease-in-out infinite;\n}\n@keyframes toolbar-nudge {\n  0%, 60%, 100% { transform: translateX(0); }\n  30% { transform: translateX(4px); }\n}\n@media (max-width: 700px) {\n  .toolbar-banner-arrow { display: none; }\n  .toolbar-banner { border-radius: 14px; border-bottom: 1px solid var(--partner-light); }\n}\n\n.section-toolbar {\n  display: grid;\n  grid-template-columns: 360px 1fr;\n  gap: 16px;\n  align-items: center;\n  margin-bottom: 28px;\n  position: sticky;\n  top: 64px;\n  z-index: 50;\n  background: var(--surface);\n  padding: 16px 20px;\n  border: 1px solid var(--partner-light);\n  border-radius: 0 0 14px 14px;\n  box-shadow: 0 6px 20px -10px rgba(113, 70, 181, 0.22);\n}\n#deposits .section-toolbar { background: var(--surface); }\n.section-search {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  background: var(--surface-neutral);\n  border: 1.5px solid var(--border);\n  border-radius: 10px;\n  padding: 12px 14px;\n  transition: all 0.15s;\n  color: var(--text-secondary);\n}\n#deposits .section-search { background: var(--surface-neutral); }\n.section-search:hover { border-color: var(--partner-light); }\n.section-search:focus-within {\n  border-color: var(--partner);\n  background: var(--surface);\n  box-shadow: 0 0 0 4px var(--partner-lighter);\n}\n.section-search > svg { color: var(--text-secondary); flex-shrink: 0; }\n.section-search:focus-within > svg { color: var(--partner); }\n.section-search input {\n  flex: 1;\n  border: none;\n  background: none;\n  font-family: inherit;\n  font-size: 14.5px;\n  font-weight: 500;\n  color: var(--text-primary);\n  outline: none;\n  min-width: 0;\n}\n.section-search input::placeholder { color: var(--text-tertiary); font-weight: 500; }\n.search-clear {\n  width: 22px;\n  height: 22px;\n  border-radius: 50%;\n  background: var(--text-tertiary);\n  color: white;\n  font-size: 14px;\n  font-weight: 600;\n  line-height: 1;\n  display: none;\n  align-items: center;\n  justify-content: center;\n  padding: 0 0 1px;\n}\n.section-search.has-value .search-clear { display: inline-flex; }\n.search-clear:hover { background: var(--text-primary); }\n\n.subsection-tabs-wrap {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  min-width: 0;\n}\n.subsection-tabs-label {\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--partner);\n  flex-shrink: 0;\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: var(--partner-lighter);\n  border: 1px solid var(--partner-light);\n}\n.subsection-tabs {\n  display: flex;\n  gap: 6px;\n  overflow-x: auto;\n  scrollbar-width: none;\n  padding: 2px;\n  flex: 1;\n  min-width: 0;\n}\n.subsection-tabs::-webkit-scrollbar { display: none; }\n.subsection-tab {\n  padding: 11px 18px;\n  font-size: 13.5px;\n  font-weight: 600;\n  color: var(--text-primary);\n  border-radius: 9px;\n  white-space: nowrap;\n  transition: all 0.15s;\n  background: var(--surface-neutral);\n  border: 1.5px solid var(--border);\n  cursor: pointer;\n}\n#deposits .subsection-tab { background: var(--surface-neutral); }\n#deposits .subsection-tab.active { background: var(--partner); }\n.subsection-tab:hover {\n  color: var(--partner);\n  border-color: var(--partner);\n  background: var(--surface);\n}\n.subsection-tab.active {\n  background: var(--partner);\n  color: white;\n  border-color: var(--partner);\n  box-shadow: 0 2px 8px rgba(113, 70, 181, 0.28);\n}\n.subsection-tab .count {\n  display: inline-block;\n  margin-left: 7px;\n  padding: 1.5px 8px;\n  border-radius: 999px;\n  background: rgba(113, 70, 181, 0.12);\n  color: var(--partner);\n  font-size: 11px;\n  font-weight: 700;\n}\n.subsection-tab.active .count { background: rgba(255,255,255,0.22); color: white; }\n\n/* Chart-grid hide flexbox helper */\n.chart-card.hidden { display: none; }\n.subsection[hidden] { display: none; }\n\n/* Empty state */\n.empty-state {\n  text-align: center;\n  padding: 56px 32px;\n  background: var(--surface);\n  border: 1px dashed var(--border);\n  border-radius: 14px;\n}\n.empty-state h4 {\n  font-size: 18px;\n  font-weight: 600;\n  margin-bottom: 8px;\n  color: var(--text-primary);\n}\n.empty-state p {\n  font-size: 14px;\n  color: var(--text-secondary);\n}\n.link-btn {\n  color: var(--partner);\n  font-weight: 600;\n  text-decoration: underline;\n  text-underline-offset: 3px;\n}\n\n/* ─────── CHART CARDS ─────── */\n#lending { background: var(--surface-neutral); }\n#deposits { background: var(--surface); }\n\n.subsection {\n  margin-bottom: 56px;\n}\n.subsection-header {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  margin-bottom: 24px;\n}\n.subsection-num {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 36px;\n  height: 36px;\n  border-radius: 10px;\n  background: var(--partner);\n  color: white;\n  font-size: 14px;\n  font-weight: 700;\n}\n.subsection-header h3 {\n  font-size: 22px;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n}\n.subsection-header p {\n  font-size: 13px;\n  color: var(--text-tertiary);\n  margin-left: auto;\n}\n\n.chart-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 20px;\n}\n.chart-grid.wide { grid-template-columns: minmax(0, 880px); justify-content: center; }\n\n.chart-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--radius-card);\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n}\n.chart-card.flag { border-color: var(--partner); }\n.chart-card.flag::before {\n  content: \"KEY CHART\";\n  display: block;\n  background: var(--partner);\n  color: white;\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.1em;\n  padding: 6px 16px;\n  text-transform: uppercase;\n}\n\n.chart-frame {\n  background: var(--sg-bg);\n  padding: 20px 24px 16px;\n  position: relative;\n}\n.chart-title-row {\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  gap: 12px;\n  margin-bottom: 4px;\n}\n.chart-title-row h4 {\n  font-size: 18px;\n  font-weight: 600;\n  color: var(--sg-title);\n  letter-spacing: -0.01em;\n  line-height: 1.2;\n  flex: 1;\n  min-width: 0;\n}\n.chart-title-row > div { flex: 1; min-width: 0; }\n.chart-info-btn {\n  width: 24px;\n  height: 24px;\n  border-radius: 50%;\n  background: rgba(31, 39, 71, 0.08);\n  color: var(--sg-title);\n  font-size: 13px;\n  font-weight: 600;\n  display: grid;\n  place-items: center;\n  flex-shrink: 0;\n  transition: all 0.2s;\n}\n.chart-info-btn:hover { background: var(--partner); color: white; }\n.chart-info-btn.active { background: var(--partner); color: white; }\n.chart-sub {\n  font-size: 13px;\n  color: var(--sg-axis);\n  margin-bottom: 8px;\n  font-weight: 400;\n}\n.chart-canvas-wrap {\n  position: relative;\n  height: 280px;\n}\n.chart-canvas-wrap.tall { height: 340px; }\n.chart-canvas-wrap.short { height: 200px; }\n\n/* HTML funnel (for funnel-shaped charts) */\n.html-funnel {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  padding: 12px 0;\n  gap: 8px;\n  max-width: 720px;\n  margin: 0 auto;\n}\n.html-funnel-step {\n  width: 100%;\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: center;\n  gap: 16px;\n}\n.html-funnel-step > .html-funnel-bar { justify-self: center; }\n.html-funnel-bar {\n  height: 48px;\n  flex-shrink: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: white;\n  font-size: 14px;\n  font-weight: 600;\n  font-family: \"Albert Sans\", sans-serif;\n  border-radius: 2px;\n  margin: 0 auto;\n  transition: opacity 0.2s;\n  white-space: nowrap;\n  overflow: visible;\n  padding: 0 16px;\n  position: relative;\n  /* Subtle text shadow so label stays legible on light pastel bars */\n  text-shadow: 0 1px 2px rgba(31, 39, 71, 0.35);\n}\n.html-funnel-step {\n  flex-shrink: 0;\n}\n.html-funnel-bar.compact span {\n  position: absolute;\n  left: 100%;\n  margin-left: 12px;\n  color: var(--sg-title);\n  font-weight: 500;\n  white-space: nowrap;\n}\n.html-funnel-bar:hover { opacity: 0.92; }\n.html-funnel-pct {\n  font-size: 16px;\n  font-weight: 600;\n  color: var(--sg-title);\n  min-width: 70px;\n  text-align: left;\n}\n\n/* Chart explainer (tabs below chart) */\n.chart-explain {\n  padding: 16px 24px 20px;\n  border-top: 1px solid var(--border);\n  background: var(--surface);\n  display: none;\n}\n.chart-explain.open { display: block; }\n.explain-tabs {\n  display: flex;\n  gap: 4px;\n  margin-bottom: 14px;\n  border-bottom: 1px solid var(--border);\n}\n.explain-tab {\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--text-tertiary);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  padding: 8px 12px 10px;\n  border-bottom: 2px solid transparent;\n  transition: all 0.2s;\n}\n.explain-tab:hover { color: var(--text-primary); }\n.explain-tab.active { color: var(--partner); border-bottom-color: var(--partner); }\n/* \"Try a read\" — small lightbulb, absolutely positioned so it doesn't grow the tab */\n.explain-tab[data-tab=\"read\"] { position: relative; padding-left: 30px; }\n.explain-tab[data-tab=\"read\"] .thinker-ico {\n  position: absolute;\n  left: 6px;\n  top: 50%;\n  transform: translateY(-50%);\n  width: 22px;\n  height: 22px;\n  opacity: 0.85;\n  transition: opacity 0.18s ease, transform 0.18s ease;\n}\n.explain-tab[data-tab=\"read\"]:hover .thinker-ico,\n.explain-tab[data-tab=\"read\"].active .thinker-ico { opacity: 1; transform: translateY(calc(-50% - 1px)) rotate(-3deg); }\n.explain-section-read p:first-child { margin-top: 0; }\n\n/* ─────── \"Try a read\" — prompt → reveal flashcard ─────── */\n.explain-section-read .read-stage { display: none; }\n.explain-section-read .read-stage.active { display: block; animation: read-stage-in 0.28s ease both; }\n@keyframes read-stage-in {\n  from { opacity: 0; transform: translateY(6px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n/* Stage 1: prompt */\n.read-prompt-header {\n  margin-bottom: 4px;\n}\n.read-prompt-header h5 {\n  font-size: 17px;\n  font-weight: 700;\n  color: var(--text-primary);\n  letter-spacing: -0.01em;\n  margin: 0;\n  line-height: 1.25;\n}\n.read-prompt-lead {\n  font-size: 13px;\n  color: var(--text-secondary);\n  margin: 0 0 14px;\n  line-height: 1.5;\n}\n.read-prompt-questions {\n  list-style: none;\n  margin: 0 0 16px;\n  padding: 0;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.read-prompt-questions li {\n  padding: 11px 14px;\n  background: var(--surface-neutral);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  font-size: 13.5px;\n  font-weight: 500;\n  color: var(--text-primary);\n  line-height: 1.45;\n}\n.read-reveal-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 11px 20px;\n  background: var(--eyebrow-grey);\n  color: white;\n  border: none;\n  border-radius: 10px;\n  font-family: inherit;\n  font-size: 13.5px;\n  font-weight: 700;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n  cursor: pointer;\n  box-shadow: 0 4px 12px -4px rgba(101, 103, 161, 0.5);\n  transition: all 0.15s;\n}\n.read-reveal-btn:hover {\n  background: #4F5187;\n  box-shadow: 0 6px 16px -4px rgba(101, 103, 161, 0.65);\n  transform: translateY(-1px);\n}\n.read-reveal-btn svg { transition: transform 0.18s; }\n.read-reveal-btn:hover svg { transform: translateX(3px); }\n\n/* Stage 2: revealed — three numbered blocks */\n.read-block {\n  padding: 14px 16px 14px 16px;\n  border-radius: 10px;\n  margin-bottom: 10px;\n  background: var(--surface-neutral);\n  border: 1px solid var(--border);\n}\n.read-block:last-of-type { margin-bottom: 14px; }\n.read-block-meaning { border-left: 3px solid var(--partner); }\n.read-block-causes { border-left: 3px solid var(--partner-light); }\n.read-block-apply { border-left: 3px solid #C49A3F; background: #FBF6E8; border-color: #EEDFA8; }\n.read-block-apply .read-block-num { background: #C49A3F; }\n.read-block-causes .read-block-num { background: var(--partner-light); color: var(--partner); }\n\n.read-block-label {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--text-primary);\n  margin-bottom: 6px;\n}\n.read-block-num {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 20px;\n  height: 20px;\n  border-radius: 50%;\n  background: var(--partner);\n  color: white;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0;\n}\n.read-block p { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--text-primary); }\n.read-block p + p { margin-top: 6px; }\n.read-block strong { color: var(--text-primary); }\n\n.read-reset-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 7px 12px;\n  background: transparent;\n  color: var(--text-secondary);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  font-family: inherit;\n  font-size: 12px;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.15s;\n}\n.read-reset-btn:hover { color: var(--partner); border-color: var(--partner); }\n.read-reset-btn svg { opacity: 0.7; }\n\n.explain-content {\n  font-size: 14px;\n  line-height: 1.55;\n  color: var(--text-primary);\n}\n.explain-content p { margin-bottom: 8px; }\n.explain-content p:last-child { margin-bottom: 0; }\n.explain-content strong { font-weight: 600; }\n.explain-content ul { list-style: none; }\n.explain-content ul li {\n  position: relative;\n  padding-left: 20px;\n  margin-bottom: 6px;\n}\n.explain-content ul li::before {\n  content: \"→\";\n  position: absolute;\n  left: 0;\n  color: var(--partner);\n  font-weight: 700;\n}\n.explain-section { display: none; }\n.explain-section.active { display: block; }\n\n/* Quick read banner — pinned above tabs */\n.chart-quick {\n  padding: 12px 24px;\n  background: rgba(113, 70, 181, 0.05);\n  border-top: 1px solid var(--border);\n  font-size: 13px;\n  color: var(--text-primary);\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n  line-height: 1.5;\n}\n.chart-quick-icon {\n  flex-shrink: 0;\n  width: 18px;\n  height: 18px;\n  border-radius: 50%;\n  background: var(--partner);\n  color: white;\n  font-size: 11px;\n  font-weight: 700;\n  display: grid;\n  place-items: center;\n  margin-top: 1px;\n}\n.chart-quick strong { color: var(--partner); font-weight: 600; }\n\n/* Chart \"How to read this chart\" CTA — prominent button between chart+explain */\n.chart-cta {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n  padding: 14px 24px;\n  width: 100%;\n  background: linear-gradient(180deg, var(--lavender) 0%, rgba(238, 230, 245, 0.5) 100%);\n  border-top: 1px dashed var(--partner-light);\n  color: var(--partner);\n  font-family: inherit;\n  font-weight: 600;\n  font-size: 14px;\n  text-align: left;\n  cursor: pointer;\n  transition: all 0.18s ease;\n}\n.chart-cta:hover { background: var(--lavender); }\n.chart-cta:hover .chart-cta-chev { transform: translateY(2px); }\n.chart-cta-left { display: flex; align-items: center; gap: 10px; min-width: 0; }\n.chart-cta-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.chart-cta-icon {\n  width: 22px; height: 22px;\n  border-radius: 50%;\n  background: var(--partner);\n  color: white;\n  display: grid; place-items: center;\n  font-size: 12px;\n  font-weight: 700;\n  flex-shrink: 0;\n}\n.chart-cta-chev {\n  transition: transform 0.2s ease;\n  color: var(--partner);\n}\n.chart-cta-hint {\n  font-size: 11px;\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  color: var(--eyebrow-grey);\n}\n.chart-cta.open {\n  background: var(--partner);\n  color: white;\n  border-top: 1px solid var(--partner);\n}\n.chart-cta.open .chart-cta-icon { background: rgba(255, 255, 255, 0.22); }\n.chart-cta.open .chart-cta-chev { transform: rotate(180deg); color: white; }\n.chart-cta.open .chart-cta-hint { color: rgba(255, 255, 255, 0.7); }\n.chart-explain { border-top: none; }\n\n/* ─────── PRIORITY METRICS (start here strip) ─────── */\n.priority-strip {\n  position: relative;\n  background: linear-gradient(135deg, var(--lavender) 0%, #FAF7FC 60%, var(--surface) 100%);\n  border: 1px solid var(--partner-light);\n  border-radius: 16px;\n  padding: 24px 28px 24px 32px;\n  margin-bottom: 32px;\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: 28px;\n  align-items: center;\n  box-shadow: 0 1px 0 rgba(113, 70, 181, 0.04), 0 10px 30px -18px rgba(113, 70, 181, 0.35);\n  overflow: hidden;\n}\n.priority-strip::before {\n  content: \"\";\n  position: absolute;\n  top: 0;\n  bottom: 0;\n  left: 0;\n  width: 4px;\n  background: var(--partner);\n}\n.priority-strip-label {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  padding-right: 28px;\n  border-right: 1px solid var(--partner-light);\n}\n.priority-strip-label .pin {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 42px;\n  height: 42px;\n  border-radius: 12px;\n  background: var(--partner);\n  color: white;\n  box-shadow: 0 6px 14px -6px rgba(113, 70, 181, 0.6);\n}\n.priority-strip-label h4 {\n  font-size: 13px;\n  font-weight: 800;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  margin-bottom: 2px;\n  color: var(--partner);\n}\n.priority-strip-label p { font-size: 12px; color: var(--text-secondary); }\n.priority-strip-items {\n  display: flex;\n  gap: 0;\n  flex-wrap: wrap;\n}\n.priority-item {\n  flex: 1;\n  min-width: 0;\n  padding: 0 16px;\n  border-right: 1px solid var(--border);\n  cursor: pointer;\n  transition: all 0.2s;\n}\n.priority-item:last-child { border-right: none; }\n.priority-item:hover { transform: translateY(-2px); }\n.priority-item .label {\n  font-size: 11px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  color: var(--text-tertiary);\n  margin-bottom: 4px;\n}\n.priority-item .name {\n  font-size: 15px;\n  font-weight: 700;\n  color: var(--partner);\n  margin-bottom: 4px;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n}\n.priority-item .name svg { width: 12px; height: 12px; opacity: 1; }\n.priority-item .desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }\n\n/* ─────── GLOSSARY ─────── */\n#glossary { background: var(--surface-neutral); }\n.glossary-search {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  padding: 12px 16px;\n  margin-bottom: 32px;\n}\n.glossary-search input {\n  flex: 1;\n  border: none;\n  background: none;\n  font-size: 15px;\n  font-family: inherit;\n  color: var(--text-primary);\n  outline: none;\n}\n.glossary-search input::placeholder { color: var(--text-tertiary); }\n.glossary-tabs {\n  display: flex;\n  gap: 4px;\n  margin-bottom: 16px;\n  flex-wrap: wrap;\n}\n.glossary-tab {\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  padding: 8px 14px;\n  border-radius: 8px;\n  transition: all 0.2s;\n  background: var(--surface);\n  border: 1px solid var(--border);\n}\n.glossary-tab:hover { color: var(--partner); border-color: var(--partner); }\n.glossary-tab.active { background: var(--partner); color: white; border-color: var(--partner); }\n.glossary-list {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 12px;\n}\n.glossary-item {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  padding: 16px 20px;\n  transition: all 0.15s;\n}\n.glossary-item:hover { border-color: var(--partner); }\n.glossary-item.hidden { display: none; }\n.glossary-item h4 {\n  font-size: 15px;\n  font-weight: 700;\n  color: var(--text-primary);\n  margin-bottom: 4px;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.glossary-item .pill {\n  font-size: 9px;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  padding: 2px 6px;\n  border-radius: 4px;\n}\n.pill-lending { background: var(--partner-lighter); color: var(--partner); }\n.pill-deposits { background: rgba(84, 137, 201, 0.12); color: var(--sg-steel); }\n.pill-platform { background: rgba(151, 166, 65, 0.16); color: var(--sg-olive); }\n.glossary-item p {\n  font-size: 13px;\n  color: var(--text-secondary);\n  line-height: 1.5;\n}\n.glossary-item .formula {\n  display: inline-block;\n  font-family: \"JetBrains Mono\", \"Menlo\", monospace;\n  font-size: 12px;\n  background: var(--surface-neutral);\n  border: 1px solid var(--border);\n  padding: 3px 8px;\n  border-radius: 6px;\n  margin-top: 8px;\n  color: var(--text-primary);\n}\n\n/* ─────── FOOTER ─────── */\n.footer {\n  background: var(--text-primary);\n  color: rgba(255,255,255,0.6);\n  text-align: center;\n  padding: 32px;\n  font-size: 13px;\n  line-height: 1.6;\n}\n.footer strong { color: white; font-weight: 600; }\n\n/* ─────── RESPONSIVE ─────── */\n@media (max-width: 1100px) {\n  .hero-inner { grid-template-columns: 1fr; gap: 32px; }\n  .hero-anim { max-width: 320px; justify-self: start; }\n  .mindset-slideshow { grid-template-columns: 1fr; }\n  .mindset-arrow { display:
