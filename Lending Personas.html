document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    font-weight: 500; font-size: 11px;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    color: #6567A1;\n    margin: 0 0 8px 0;\n  }\n  .module-title {\n    font-family: 'Albert Sans', sans-serif;\n    font-weight: 700; font-size: 26px;\n    line-height: 120%; letter-spacing: -0.02em;\n    color: #0A074D;\n    margin: 0;\n  }\n\n  /* ── PORTRAIT ROW ───────────────────────────────── */\n  .portrait-row {\n    display: flex;\n    align-items: flex-end;\n    justify-content: center;\n    gap: 12px;\n    margin-bottom: 8px;\n  }\n\n  .flow-connector {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    margin-bottom: 32px;\n    padding: 0 60px;\n  }\n  .flow-step {\n    flex: 1;\n    text-align: center;\n    font-family: 'IBM Plex Mono', monospace;\n    font-weight: 400; font-size: 11px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: #6567A1;\n  }\n  .flow-step.active { color: #0A074D; }\n  .flow-arrow {\n    width: 32px;\n    flex-shrink: 0;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    color: #D9D9D9;\n  }\n  .flow-arrow svg { display: block; }\n\n  /* ── PORTRAIT CARD ──────────────────────────────── */\n  .portrait {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 12px;\n    cursor: pointer;\n    padding: 16px 12px 20px;\n    border-radius: 16px;\n    border: 2px solid transparent;\n    background: transparent;\n    transition: transform 200ms cubic-bezier(0, 0, 0.2, 1),\n                border-color 200ms cubic-bezier(0, 0, 0.2, 1),\n                background 200ms cubic-bezier(0, 0, 0.2, 1);\n    flex: 1;\n    max-width: 200px;\n    outline: none;\n    -webkit-tap-highlight-color: transparent;\n  }\n  .portrait:hover { transform: translateY(-4px); }\n  .portrait:focus-visible {\n    box-shadow: 0 0 0 3px rgba(113, 70, 181, 0.3);\n  }\n  .portrait.active {\n    transform: translateY(-6px);\n    background: #fff;\n    border-color: #D9D9D9;\n    box-shadow: 0px 4px 24px -2px rgba(47, 57, 76, 0.2);\n  }\n  .portrait[data-persona=\"riley\"].active  { border-color: #B05315; }\n  .portrait[data-persona=\"tommie\"].active { border-color: #7146B5; }\n  .portrait[data-persona=\"max\"].active    { border-color: #6567A1; }\n\n  .portrait-img {\n    width: 120px; height: 120px;\n    border-radius: 50%;\n    overflow: hidden;\n    transition: box-shadow 200ms cubic-bezier(0, 0, 0.2, 1);\n  }\n  .portrait.active .portrait-img {\n    box-shadow: 0 4px 20px -4px rgba(0,0,0,0.18);\n  }\n  .portrait-img svg { display: block; width: 100%; height: 100%; }\n  .portrait-img image-slot { width: 100%; height: 100%; display: block; }\n\n  .portrait-info { text-align: center; }\n  .portrait-name {\n    font-family: 'Albert Sans', sans-serif;\n    font-weight: 700; font-size: 18px;\n    line-height: 100%; letter-spacing: -0.01em;\n    color: #0A074D;\n    margin: 0 0 4px 0;\n  }\n  .portrait-role {\n    font-family: 'Work Sans', sans-serif;\n    font-weight: 300; font-size: 12px;\n    line-height: 140%; color: #6567A1;\n  }\n\n  .click-hint {\n    font-family: 'Work Sans', sans-serif;\n    font-weight: 400; font-size: 12px;\n    color: #6567A1;\n    text-align: center;\n    margin-bottom: 24px;\n    transition: opacity 300ms;\n  }\n  .click-hint.hidden { opacity: 0; pointer-events: none; height: 0; margin: 0; }\n\n  /* ── DETAIL PANEL ───────────────────────────────── */\n  .detail-panel {\n    display: none;\n    background: #fff;\n    border: 1px solid #D9D9D9;\n    border-radius: 12px;\n    overflow: hidden;\n  }\n  .detail-panel.open { display: block; }\n\n  .detail-accent { height: 4px; width: 100%; }\n  [data-persona=\"riley\"]  .detail-accent { background: #B05315; }\n  [data-persona=\"tommie\"] .detail-accent { background: #7146B5; }\n  [data-persona=\"max\"]    .detail-accent { background: #6567A1; }\n\n  .detail-content { padding: 28px 32px 32px; }\n\n  /* ── DETAIL HEADER ──────────────────────────────── */\n  .detail-header {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    margin-bottom: 24px;\n  }\n  .detail-name {\n    font-family: 'Albert Sans', sans-serif;\n    font-weight: 700; font-size: 24px;\n    line-height: 120%; letter-spacing: -0.02em;\n    color: #0A074D;\n    margin: 0;\n  }\n  .detail-role-line {\n    font-family: 'Work Sans', sans-serif;\n    font-weight: 300; font-size: 14px;\n    color: #6567A1; margin-top: 4px;\n  }\n  .location-badge {\n    display: inline-flex; align-items: center;\n    padding: 3px 10px; border-radius: 9999px;\n    font-family: 'Albert Sans', sans-serif;\n    font-weight: 600; font-size: 10px;\n    letter-spacing: 0.05em; text-transform: uppercase;\n    margin-left: 8px;\n  }\n  [data-persona=\"riley\"]  .location-badge { background: #FDEBD6; color: #8A3D0C; }\n  [data-persona=\"tommie\"] .location-badge { background: #EEE6F5; color: #643D9D; }\n  [data-persona=\"max\"]    .location-badge { background: #EDEEF5; color: #4A4C80; }\n\n  /* ── SECTIONS ───────────────────────────────────── */\n  .section-divider { height: 1px; background: #E7E7E7; margin: 24px 0; border: none; }\n  .section { margin-bottom: 24px; }\n  .section:last-child { margin-bottom: 0; }\n  .section-label {\n    font-family: 'IBM Plex Mono', monospace;\n    font-weight: 500; font-size: 11px;\n    letter-spacing: 0.06em; text-transform: uppercase;\n    margin: 0 0 10px 0;\n  }\n  [data-persona=\"riley\"]  .section-label { color: #B05315; }\n  [data-persona=\"tommie\"] .section-label { color: #7146B5; }\n  [data-persona=\"max\"]    .section-label { color: #6567A1; }\n\n  .section-body {\n    font-family: 'Work Sans', sans-serif;\n    font-weight: 300; font-size: 15px;\n    line-height: 160%; color: #0A074D;\n    text-wrap: pretty;\n  }\n\n  /* ── COLUMNS ────────────────────────────────────── */\n  .content-columns {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 28px; margin-bottom: 24px;\n  }\n  .content-columns .section { margin-bottom: 0; }\n\n  /* ── LISTS ──────────────────────────────────────── */\n  .goal-list, .friction-list {\n    list-style: none; padding: 0;\n    display: flex; flex-direction: column; gap: 8px;\n  }\n  .goal-list li, .friction-list li {\n    font-family: 'Work Sans', sans-serif;\n    font-weight: 300; font-size: 14px;\n    line-height: 155%; color: #0A074D;\n    padding-left: 18px; position: relative;\n    text-wrap: pretty;\n  }\n  .goal-list li::before {\n    content: ''; position: absolute; left: 0; top: 8px;\n    width: 7px; height: 7px; border-radius: 50%;\n  }\n  .friction-list li::before {\n    content: ''; position: absolute; left: 1px; top: 8px;\n    width: 5px; height: 5px; border-radius: 50%;\n    border: 1.5px solid;\n  }\n  [data-persona=\"riley\"]  .goal-list li::before    { background: #B05315; }\n  [data-persona=\"riley\"]  .friction-list li::before { border-color: #E39B6A; }\n  [data-persona=\"tommie\"] .goal-list li::before    { background: #7146B5; }\n  [data-persona=\"tommie\"] .friction-list li::before { border-color: #B39BD7; }\n  [data-persona=\"max\"]    .goal-list li::before    { background: #6567A1; }\n  [data-persona=\"max\"]    .friction-list li::before { border-color: #A0A2C8; }\n\n  /* ── CALLOUT ────────────────────────────────────── */\n  .callout {\n    padding: 18px 22px; border-radius: 8px; border-left: 3px solid;\n  }\n  /* Callout uses brand dark blue for all personas */\n  .callout {\n    background: #0A074D !important;\n    border-left-color: #7146B5 !important;\n  }\n  .callout-label,\n  [data-persona] .callout-label { color: #EEE6F5 !important; }\n  .callout-body { color: #FCFCFC !important; }\n  .callout-label {\n    font-family: 'IBM Plex Mono', monospace;\n    font-weight: 500; font-size: 11px;\n    letter-spacing: 0.06em; text-transform: uppercase;\n    margin-bottom: 8px;\n  }\n  [data-persona=\"riley\"]  .callout-label { color: #B05315; }\n  [data-persona=\"tommie\"] .callout-label { color: #7146B5; }\n  [data-persona=\"max\"]    .callout-label { color: #6567A1; }\n  .callout-body {\n    font-family: 'Work Sans', sans-serif;\n    font-weight: 300; font-size: 14px;\n    line-height: 155%; color: #0A074D;\n    text-wrap: pretty;\n  }\n\n  /* ── VIDEO ───────────────────────────────────────── */\n  .video-caption {\n    display: flex;\n    justify-content: flex-end;\n    margin: 0 0 20px;\n  }\n  .video-index {\n    font-family: 'IBM Plex Mono', monospace;\n    font-weight: 500; font-size: 11px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    white-space: nowrap;\n    color: #4A4A4A;\n  }\n  .video-wrap {\n    position: relative;\n    width: 100%;\n    padding-bottom: 56.25%; /* 16:9 */\n    border-radius: 8px;\n    overflow: hidden;\n    background: #F7F7F7;\n    margin-bottom: 8px;\n    transition: opacity 220ms cubic-bezier(0, 0, 0.2, 1);\n  }\n  .video-wrap.swapping { opacity: 0; }\n  .video-wrap iframe {\n    position: absolute;\n    top: 0; left: 0;\n    width: 100%; height: 100%;\n    border: none;\n  }\n  .video-placeholder {\n    position: absolute;\n    top: 0; left: 0; right: 0; bottom: 0;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 8px;\n    color: #6567A1;\n  }\n  .video-placeholder svg { display: block; }\n  .video-placeholder span {\n    font-family: 'Work Sans', sans-serif;\n    font-weight: 400; font-size: 12px;\n  }\n  .video-wrap.has-video .video-placeholder { display: none; }\n\n  /* ── PUSH-IN ANIMATION (friction \"bumps\" goals) ─────────────────────── */\n  .friction-section {\n    padding: 18px 20px;\n    border-radius: 10px;\n    margin: 0;\n  }\n  [data-persona=\"riley\"]  .friction-section { background: #FDF1E3; }\n  [data-persona=\"tommie\"] .friction-section { background: #F4ECF8; }\n  [data-persona=\"max\"]    .friction-section { background: #EFF0F7; }\n\n  .content-columns .friction-section {\n    opacity: 0;\n    transform: translateX(40px);\n    transition: opacity 500ms cubic-bezier(0, 0, 0.2, 1),\n                transform 500ms cubic-bezier(0.34, 1.4, 0.64, 1);\n  }\n  .content-columns.friction-revealed .friction-section {\n    opacity: 1;\n    transform: translateX(0);\n  }\n  .content-columns.friction-revealed .goal-section {\n    animation: goal-nudge 400ms ease-out;\n  }\n  @keyframes goal-nudge {\n    0%, 100% { transform: translateX(0); }\n    35%      { transform: translateX(-6px); }\n    70%      { transform: translateX(2px); }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    .content-columns .friction-section { opacity: 1; transform: none; transition: none; }\n    .content-columns.friction-revealed .goal-section { animation: none; }\n  }\n\n  /* ── REVEAL STEPS ───────────────────────────────── */\n  .reveal-step { display: none; }\n  .reveal-step.visible {\n    display: block;\n    animation: step-switch 280ms cubic-bezier(0, 0, 0.2, 1);\n  }\n  @keyframes step-switch {\n    from { opacity: 0; transform: translateY(6px); }\n    to   { opacity: 1; transform: none; }\n  }\n\n  /* ── STEP FOOTER (progress + button) ────────────── */\n  .step-footer {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-top: 28px;\n    padding-top: 20px;\n    border-top: 1px solid #E7E7E7;\n  }\n  .progress-dots {\n    display: flex; gap: 8px; align-items: center;\n  }\n  .progress-dot {\n    width: 8px; height: 8px; border-radius: 50%;\n    background: #D9D9D9;\n    transition: background 200ms, transform 200ms;\n  }\n  .progress-dot.filled { transform: scale(1.15); }\n  [data-persona=\"riley\"]  .progress-dot.filled { background: #B05315; }\n  [data-persona=\"tommie\"] .progress-dot.filled { background: #7146B5; }\n  [data-persona=\"max\"]    .progress-dot.filled { background: #6567A1; }\n\n  .step-label {\n    font-family: 'IBM Plex Mono', monospace;\n    font-weight: 400; font-size: 11px;\n    color: #6567A1; margin-left: 10px;\n  }\n\n  .next-btn {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 10px 20px;\n    border: none; border-radius: 9999px;\n    font-family: 'Albert Sans', sans-serif;\n    font-weight: 700; font-size: 13px;\n    letter-spacing: 0.04em; text-transform: uppercase;\n    color: #fff; cursor: pointer;\n    transition: opacity 200ms, transform 200ms;\n  }\n  .next-btn:hover { opacity: 0.88; transform: translateY(-1px); }\n  .next-btn:active { transform: translateY(0); }\n  .next-btn:focus-visible {\n    outline: 3px solid #0A074D;\n    outline-offset: 2px;\n  }\n  .next-btn svg { display: block; }\n  [data-persona=\"riley\"]  .next-btn { background: #B05315; }\n  [data-persona=\"tommie\"] .next-btn { background: #7146B5; }\n  [data-persona=\"max\"]    .next-btn { background: #6567A1; }\n\n  /* \"With Clutch\" button uses brand purple for all personas */\n  .next-btn.clutch-state { background: #7146B5 !important; }\n  .next-btn.hidden { display: none; }\n\n  .next-btn.done-state {\n    background: #EEE6F5;\n    color: #6567A1;\n    cursor: default;\n  }\n  .next-btn.done-state:hover { opacity: 1; transform: none; }\n\n  /* ── BACK / STEP NAV ────────────────────────────── */\n  .step-actions { display: flex; align-items: center; gap: 10px; }\n  .back-btn {\n    display: inline-flex; align-items: center; gap: 5px;\n    padding: 10px 14px;\n    border: none; background: transparent;\n    font-family: 'Albert Sans', sans-serif;\n    font-weight: 700; font-size: 13px;\n    letter-spacing: 0.04em; text-transform: uppercase;\n    color: #6567A1; cursor: pointer;\n    border-radius: 9999px;\n    transition: opacity 200ms, background 200ms;\n  }\n  .back-btn:hover { background: rgba(101, 103, 161, 0.10); }\n  .back-btn:focus-visible { outline: 3px solid #0A074D; outline-offset: 2px; }\n  .back-btn svg { display: block; }\n  .back-btn.hidden { display: none; }\n  .progress-dot { cursor: pointer; }\n  .progress-dot:hover { box-shadow: 0 0 0 4px rgba(101, 103, 161, 0.12); }\n  .progress-dot:focus-visible { outline: 2px solid #0A074D; outline-offset: 3px; }\n\n  /* ── RESPONSIVE ─────────────────────────────────── */\n  @media (max-width: 580px) {\n    body { padding: 12px; }\n    .portrait-row { gap: 6px; }\n    .portrait { padding: 12px 8px 16px; }\n    .portrait-img { width: 90px; height: 90px; }\n    .portrait-name { font-size: 15px; }\n    .portrait-role { font-size: 11px; }\n    .content-columns { grid-template-columns: 1fr; gap: 20px; }\n    .detail-content { padding: 24px 20px 28px; }\n    .detail-name { font-size: 22px; }\n    .flow-connector { padding: 0 30px; }\n    .flow-arrow { width: 24px; }\n    .module-title { font-size: 22px; }\n    .step-footer { flex-direction: column-reverse; gap: 16px; align-items: stretch; }\n    .next-btn { justify-content: center; }\n    .progress-dots { justify-content: center; }\n    .step-actions { justify-content: center; }\n  }\n  @media (max-width: 380px) {\n    .portrait-img { width: 76px; height: 76px; }\n    .portrait { padding: 10px 6px 14px; }\n    .detail-content { padding: 20px 16px 24px; }\n    .flow-connector { padding: 0 20px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<section class=\"module\" aria-labelledby=\"module-title\">\n\n  <div class=\"module-header\">\n    <p class=\"module-eyebrow\">First impressions<\u002Fp>\n    <h1 class=\"module-title\" id=\"module-title\">Meet the Clutch Training FCU lending team<\u002Fh1>\n  <\u002Fdiv>\n\n  <!-- ── PORTRAIT ROW ─────────────────────────────── -->\n  <div class=\"portrait-row\">\n\n    <!-- RILEY -->\n    <button class=\"portrait\" data-persona=\"riley\" aria-expanded=\"false\" aria-controls=\"detail-riley\" aria-label=\"Riley, MSR / LSR. Show profile.\">\n      <div class=\"portrait-img\" aria-hidden=\"true\">\n        <image-slot id=\"portrait-riley\" shape=\"circle\" src=\"data:image/webp;base64,UklGRmojAABXRUJQVlA4WAoAAAAgAAAAjwEAjwEASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAA content\">\n      <div class=\"detail-header\">\n        <div>\n          <h2 class=\"detail-name\">Riley<\u002Fh2>\n          <div class=\"detail-role-line\">MSR / LSR <span class=\"location-badge\">Branch / Digital<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"video-wrap\" data-persona-video=\"riley\" data-video-title=\"Meet Riley\">\n        <div class=\"video-placeholder\" aria-hidden=\"true\">\n          <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><circle cx=\"20\" cy=\"20\" r=\"19\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fcircle><polygon points=\"16,12 30,20 16,28\" fill=\"currentColor\"><\u002Fpolygon><\u002Fsvg>\n          <span>Video coming soon<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"video-caption\" aria-hidden=\"true\">\n        <span class=\"video-index\">Video 1 of 3<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step visible\" data-step=\"1\">\n        <div class=\"section\">\n          <h3 class=\"section-label\">Who she is<\u002Fh3>\n          <p class=\"section-body\">Riley is usually the first and last person the member talks to. She takes the application, fields the follow-up calls, and delivers the news — good or bad. She doesn't set the credit policy, but she owns the member relationship through the whole process.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step\" data-step=\"2\">\n        <div class=\"section goal-section\">\n            <h3 class=\"section-label\">What she's trying to do<\u002Fh3>\n            <ul class=\"goal-list\">\n              <li>Give members accurate, timely updates on their application status<\u002Fli>\n              <li>Collect the right documents without sending members on unnecessary trips<\u002Fli>\n              <li>Handle declines with care and clarity<\u002Fli>\n              <li>Keep the process moving without stepping outside her lane<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step\" data-step=\"3\">\n        <div class=\"section\">\n            <h3 class=\"section-label\">What gets in the way<\u002Fh3>\n            <ul class=\"friction-list\">\n              <li>Loan status isn't visible without digging through multiple systems<\u002Fli>\n              <li>Decline and pend reasons surface as codes, not plain-language explanations<\u002Fli>\n              <li>She often doesn't know why a condition was added, so she can't explain it to the member accurately<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step-footer\">\n        <div class=\"progress-dots\">\n          <div class=\"progress-dot filled\" data-dot=\"1\" aria-hidden=\"true\"><\u002Fdiv>\n          <div class=\"progress-dot\" data-dot=\"2\" aria-hidden=\"true\"><\u002Fdiv>\n          <div class=\"progress-dot\" data-dot=\"3\" aria-hidden=\"true\"><\u002Fdiv>\n          <span class=\"step-label\" aria-live=\"polite\" aria-atomic=\"true\">Step 1 of 3<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-actions\">\n          <button class=\"back-btn hidden\" data-action=\"back\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M10 3L5 8l5 5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span>Back<\u002Fspan><\u002Fbutton>\n          <button class=\"next-btn\" data-action=\"next\">\n          <span class=\"btn-text\">What she's trying to do<\u002Fspan>\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ TOMMIE DETAIL ═══ -->\n  <div class=\"detail-panel\" data-persona=\"tommie\" id=\"detail-tommie\" role=\"region\" aria-label=\"Tommie profile\">\n    <div class=\"detail-accent\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"detail-content\">\n      <div class=\"detail-header\">\n        <div>\n          <h2 class=\"detail-name\">Tommie<\u002Fh2>\n          <div class=\"detail-role-line\">Underwriter <span class=\"location-badge\">Back Office<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"video-wrap\" data-persona-video=\"tommie\" data-video-title=\"Meet Tommie\">\n        <div class=\"video-placeholder\" aria-hidden=\"true\">\n          <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><circle cx=\"20\" cy=\"20\" r=\"19\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fcircle><polygon points=\"16,12 30,20 16,28\" fill=\"currentColor\"><\u002Fpolygon><\u002Fsvg>\n          <span>Video coming soon<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"video-caption\" aria-hidden=\"true\">\n        <span class=\"video-index\">Video 1 of 3<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step visible\" data-step=\"1\">\n        <div class=\"section\">\n          <h3 class=\"section-label\">Who she is<\u002Fh3>\n          <p class=\"section-body\">Tommie is the person who decides. Applications land in her queue every morning, and she works each one methodically — pulling the credit report, reviewing income, checking collateral values, and applying the CU's lending policy — until she reaches a decision she can defend. She's analytical, thorough, and quietly carrying more context than anyone realizes.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step\" data-step=\"2\">\n        <div class=\"section goal-section\">\n            <h3 class=\"section-label\">What she's trying to do<\u002Fh3>\n            <ul class=\"goal-list\">\n              <li>Evaluate creditworthiness accurately and quickly<\u002Fli>\n              <li>Reconstruct the full picture of a borrower's financial situation<\u002Fli>\n              <li>Make decisions she can defend if they're ever audited<\u002Fli>\n              <li>Clear her queue without cutting corners<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step\" data-step=\"3\">\n        <div class=\"section\">\n            <h3 class=\"section-label\">What gets in the way<\u002Fh3>\n            <ul class=\"friction-list\">\n              <li>Credit report, income docs, and collateral values live in separate systems — she assembles the full picture before she can even start<\u002Fli>\n              <li>Borderline files land in gray areas where the CU's exception rules aren't clearly documented<\u002Fli>\n              <li>The member's story doesn't travel with the file — she sees the numbers, not the context behind them<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step-footer\">\n        <div class=\"progress-dots\">\n          <div class=\"progress-dot filled\" data-dot=\"1\" aria-hidden=\"true\"><\u002Fdiv>\n          <div class=\"progress-dot\" data-dot=\"2\" aria-hidden=\"true\"><\u002Fdiv>\n          <div class=\"progress-dot\" data-dot=\"3\" aria-hidden=\"true\"><\u002Fdiv>\n          <span class=\"step-label\" aria-live=\"polite\" aria-atomic=\"true\">Step 1 of 3<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-actions\">\n          <button class=\"back-btn hidden\" data-action=\"back\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M10 3L5 8l5 5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span>Back<\u002Fspan><\u002Fbutton>\n          <button class=\"next-btn\" data-action=\"next\">\n          <span class=\"btn-text\">What she's trying to do<\u002Fspan>\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ MAX DETAIL ═══ -->\n  <div class=\"detail-panel\" data-persona=\"max\" id=\"detail-max\" role=\"region\" aria-label=\"Max profile\">\n    <div class=\"detail-accent\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"detail-content\">\n      <div class=\"detail-header\">\n        <div>\n          <h2 class=\"detail-name\">Max<\u002Fh2>\n          <div class=\"detail-role-line\">Loan Processor <span class=\"location-badge\">Back Office<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"video-wrap\" data-persona-video=\"max\" data-video-title=\"Meet Max\">\n        <div class=\"video-placeholder\" aria-hidden=\"true\">\n          <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><circle cx=\"20\" cy=\"20\" r=\"19\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fcircle><polygon points=\"16,12 30,20 16,28\" fill=\"currentColor\"><\u002Fpolygon><\u002Fsvg>\n          <span>Video coming soon<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"video-caption\" aria-hidden=\"true\">\n        <span class=\"video-index\">Video 1 of 3<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step visible\" data-step=\"1\">\n        <div class=\"section\">\n          <h3 class=\"section-label\">Who he is<\u002Fh3>\n          <p class=\"section-body\">Max is the last checkpoint before a loan funds. He's methodical, detail-oriented, and owns the stretch of work that most people don't think about — conditions, documents, disbursements, and the final click. When something slips through, it's usually his name on the file.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step\" data-step=\"2\">\n        <div class=\"section goal-section\">\n            <h3 class=\"section-label\">What he's trying to do<\u002Fh3>\n            <ul class=\"goal-list\">\n              <li>Confirm every condition is genuinely cleared before generating documents<\u002Fli>\n              <li>Catch errors before they reach the member<\u002Fli>\n              <li>Book loans cleanly and confidently<\u002Fli>\n              <li>Move files efficiently without holding up other teams<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal-step\" data-step=\"3\">\n        <div class=\"section\">\n            <h3 class=\"section-label\">What gets in the way<\u002Fh3>\n            <ul class=\"friction-list\">\n              <li>He inherits files with no clean handoff summary from underwriting<\u002Fli>\n              <li>Conditions appear open in the system even when they've been resolved verbally<\u002Fli>\n              <li>He can't tell at a glance whether a file is actually ready to book<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step-footer\">\n        <div class=\"progress-dots\">\n          <div class=\"progress-dot filled\" data-dot=\"1\" aria-hidden=\"true\"><\u002Fdiv>\n          <div class=\"progress-dot\" data-dot=\"2\" aria-hidden=\"true\"><\u002Fdiv>\n          <div class=\"progress-dot\" data-dot=\"3\" aria-hidden=\"true\"><\u002Fdiv>\n          <span class=\"step-label\" aria-live=\"polite\" aria-atomic=\"true\">Step 1 of 3<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"step-actions\">\n          <button class=\"back-btn hidden\" data-action=\"back\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M10 3L5 8l5 5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span>Back<\u002Fspan><\u002Fbutton>\n          <button class=\"next-btn\" data-action=\"next\">\n          <span class=\"btn-text\">What he's trying to do<\u002Fspan>\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<script>\n(function() {\n  /* ═══════════════════════════════════════════════════════════════\n     VIDEO URLS — Paste your video links here!\n\n     Google Drive:  https://drive.google.com/file/d/YOUR_FILE_ID/preview\n     YouTube:       https://www.youtube.com/watch?v=VIDEO_ID\n                    (or https://youtu.be/VIDEO_ID)\n     Direct MP4:    https://your-host.com/video.mp4\n\n     Leave blank ('') to show the placeholder.\n  ═══════════════════════════════════════════════════════════════ */\n  var VIDEO_URLS = {\n    /* One link per step (1-4) — index 0 = step 1, index 3 = step 4.\n       The video swaps as the learner clicks \"Next.\"\n       Leave any slot '' to show the placeholder for that step. */\n    riley:  [\n      'https://drive.google.com/file/d/1LJQ7M0js5pxskSQn42Qk4s55cNdcuVav/view',\n      'https://drive.google.com/file/d/1IoCu-kOM6nu7Qf1HZIxqkdyBDGJreiC1/view',\n      'https://drive.google.com/file/d/1sWPKXhsbdWkiYkAOcsk1JgsG3EaCd52L/view'\n    ],\n    tommie: [\n      'https://drive.google.com/file/d/1O_Qyuiy65rzQfUCqNQRG5jBLV57F9hfd/view',\n      'https://drive.google.com/file/d/1dO0U9f7je2AdjkmImTeiceS4ySnVwULt/view',\n      'https://drive.google.com/file/d/1qylMK_tfJMmsKLAh1W1V_qWANujUDA1-/view'\n    ],\n    max:    [\n      'https://drive.google.com/file/d/1MFnjQumMX2sp6PslCALNz8yAOwyua9q_/view',\n      'https://drive.google.com/file/d/1AOQuGE3qXTLXtkuPtKpEjqYFpDFzBlp9/view',\n      'https://drive.google.com/file/d/1WCBTnQDNHnCbsyW5MiZDb3wB0u28CGjP/view'\n    ]\n  };\n\n  /* Auto-convert common URL formats to embeddable form */\n  function toEmbedUrl(url) {\n    if (!url) return '';\n    url = url.trim();\n    /* YouTube watch links */\n    var yt = url.match(/(?:youtube\\.com\\/watch\\?v=|youtu\\.be\\/)([\\w-]+)/);\n    if (yt) return 'https://www.youtube.com/embed/' + yt[1];\n    /* YouTube already embed */\n    if (url.indexOf('youtube.com/embed/') !== -1) return url;\n    /* Google Drive share links → preview */\n    var gd = url.match(/drive\\.google\\.com\\/file\\/d\\/([\\w-]+)/);\n    if (gd) return 'https://drive.google.com/file/d/' + gd[1] + '/preview';\n    /* Already a Drive preview link */\n    if (url.indexOf('drive.google.com') !== -1 && url.indexOf('/preview') !== -1) return url;\n    /* Loom share → embed */\n    var loom = url.match(/loom\\.com\\/share\\/(\\w+)/);\n    if (loom) return 'https://www.loom.com/embed/' + loom[1];\n    /* Vimeo */\n    var vim = url.match(/vimeo\\.com\\/(\\d+)/);\n    if (vim) return 'https://player.vimeo.com/video/' + vim[1];\n    /* Fallback — use as-is */\n    return url;\n  }\n\n  /* Swap the video for a persona to match the current step (1-4). */\n  function setVideo(persona, step) {\n    var wrap = document.querySelector('[data-persona-video=\"' + persona + '\"]');\n    if (!wrap) return;\n    var list = VIDEO_URLS[persona] || [];\n    var src = toEmbedUrl(list[step - 1] || '');\n    var existing = wrap.querySelector('iframe');\n    if (!src) {\n      if (existing) existing.remove();\n      wrap.classList.remove('has-video');\n      return;\n    }\n    /* Same video already loaded for this step — leave it playing. */\n    if (existing && existing.getAttribute('data-src') === src) return;\n    wrap.classList.add('swapping');\n    if (existing) existing.remove();\n    var iframe = document.createElement('iframe');\n    iframe.src = src;\n    iframe.setAttribute('data-src', src);\n    iframe.title = (wrap.getAttribute('data-video-title') || 'Persona video') + ' \\u2014 step ' + step;\n    iframe.setAttribute('allowfullscreen', '');\n    iframe.setAttribute('allow', 'autoplay; encrypted-media');\n    wrap.classList.add('has-video');\n    wrap.appendChild(iframe);\n    requestAnimationFrame(function() {\n      requestAnimationFrame(function() { wrap.classList.remove('swapping'); });\n    });\n  }\n\n  /* Update the chapter label above a persona's video for the current step. */\n  function setVideoCaption(persona, step) {\n    var panel = document.getElementById('detail-' + persona);\n    if (!panel) return;\n    var idx = panel.querySelector('.video-index');\n    if (idx) idx.textContent = 'Video ' + step + ' of ' + TOTAL_STEPS;\n  }\n\n  var portraits = document.querySelectorAll('.portrait');\n  var panels = document.querySelectorAll('.detail-panel');\n  var hint = document.getElementById('clickHint');\n  var flowSteps = {\n    riley: document.getElementById('flow-riley'),\n    tommie: document.getElementById('flow-tommie'),\n    max: document.getElementById('flow-max')\n  };\n\n  var current = null;\n  var stepState = { riley: 1, tommie: 1, max: 1 };\n  var TOTAL_STEPS = 3;\n\n  /* Per-persona button labels — each entry previews what the NEXT click reveals. */\n  var BUTTON_LABELS = {\n    riley:  ['', \"What she's trying to do\", 'What gets in the way'],\n    tommie: ['', \"What she's trying to do\", 'What gets in the way'],\n    max:    ['', \"What he's trying to do\",  'What gets in the way']\n  };\n\n  /* Chapter title shown above the video for the CURRENT step. */\n  var CHAPTERS = {\n    riley:  ['Who she is', \"What she's trying to do\", 'What gets in the way'],\n    tommie: ['Who she is', \"What she's trying to do\", 'What gets in the way'],\n    max:    ['Who he is',  \"What he's trying to do\",  'What gets in the way']\n  };\n\n  function updatePanel(persona) {\n    var panel = document.getElementById('detail-' + persona);\n    var step = stepState[persona];\n    var steps = panel.querySelectorAll('.reveal-step');\n    var dots = panel.querySelectorAll('.progress-dot');\n    var label = panel.querySelector('.step-label');\n    var btn = panel.querySelector('.next-btn');\n    var backBtn = panel.querySelector('.back-btn');\n    if (backBtn) backBtn.classList.toggle('hidden', step <= 1);\n\n    steps.forEach(function(s) {\n      var n = parseInt(s.dataset.step);\n      if (n === step) {\n        s.classList.add('visible');\n      } else {\n        s.classList.remove('visible');\n      }\n    });\n\n    dots.forEach(function(d) {\n      var n = parseInt(d.dataset.dot);\n      if (n <= step) {\n        d.classList.add('filled');\n      } else {\n        d.classList.remove('filled');\n      }\n    });\n\n    label.textContent = 'Step ' + step + ' of ' + TOTAL_STEPS;\n\n    setVideo(persona, step);\n    setVideoCaption(persona, step);\n\n    if (step >= TOTAL_STEPS) {\n      btn.classList.add('hidden');\n      btn.classList.remove('clutch-state');\n      btn.setAttribute('aria-hidden', 'true');\n      btn.setAttribute('tabindex', '-1');\n    } else {\n      btn.classList.remove('hidden');\n      btn.removeAttribute('aria-hidden');\n      btn.removeAttribute('tabindex');\n      btn.classList.remove('clutch-state');\n      var labels = BUTTON_LABELS[persona];\n      btn.innerHTML = '<span class=\"btn-text\">' + labels[step] + '<\u002Fspan> <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>';\n    }\n  }\n\n  function activate(persona) {\n    var isToggle = current === persona;\n\n    portraits.forEach(function(p) {\n      p.classList.remove('active');\n      p.setAttribute('aria-expanded', 'false');\n    });\n    panels.forEach(function(p) { p.classList.remove('open'); });\n    Object.keys(flowSteps).forEach(function(k) {\n      flowSteps[k].classList.remove('active');\n    });\n\n    if (isToggle) {\n      current = null;\n      hint.classList.remove('hidden');\n      return;\n    }\n\n    current = persona;\n    stepState[persona] = 1;\n    hint.classList.add('hidden');\n\n    var portrait = document.querySelector('.portrait[data-persona=\"' + persona + '\"]');\n    portrait.classList.add('active');\n    portrait.setAttribute('aria-expanded', 'true');\n\n    var panel = document.getElementById('detail-' + persona);\n    panel.classList.add('open');\n\n    flowSteps[persona].classList.add('active');\n    updatePanel(persona);\n  }\n\n  portraits.forEach(function(p) {\n    p.addEventListener('click', function() {\n      activate(this.dataset.persona);\n    });\n  });\n\n  /* Next buttons */\n  document.querySelectorAll('.next-btn').forEach(function(btn) {\n    btn.addEventListener('click', function(e) {\n      e.stopPropagation();\n      if (!current) return;\n      if (stepState[current] < TOTAL_STEPS) {\n        stepState[current]++;\n        updatePanel(current);\n      }\n    });\n  });\n\n  /* Back buttons — step backward through the walkthrough */\n  document.querySelectorAll('.back-btn').forEach(function(btn) {\n    btn.addEventListener('click', function(e) {\n      e.stopPropagation();\n      if (!current) return;\n      if (stepState[current] > 1) {\n        stepState[current]--;\n        updatePanel(current);\n      }\n    });\n  });\n\n  /* Progress dots — clickable to jump to any step (back or forward) */\n  document.querySelectorAll('.detail-panel').forEach(function(panel) {\n    var persona = panel.dataset.persona;\n    panel.querySelectorAll('.progress-dot').forEach(function(dot) {\n      dot.setAttribute('role', 'button');\n      dot.setAttribute('tabindex', '0');\n      dot.removeAttribute('aria-hidden');\n      var n = parseInt(dot.dataset.dot, 10);\n      dot.setAttribute('aria-label', 'Go to step ' + n);\n      function go(e) {\n        e.stopPropagation();\n        if (current !== persona) return;\n        stepState[persona] = n;\n        updatePanel(persona);\n      }\n      dot.addEventListener('click', go);\n      dot.addEventListener('keydown', function(e) {\n        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(e); }\n      });\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
